version: "2"
linters:
  enable:
    - godoclint
  settings:
    godoclint:
      require-pkg-doc: true
    errcheck:
      check-type-assertions: true
    staticcheck:
      checks:
        - "all"
        - "-QF1012"
        - "-ST1003"
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
