openapi: 3.1.0
info:
  title: Thane Compatibility API
  version: 1.0.0
  summary: Frozen OpenAI- and Ollama-compatible surfaces for foreign clients.
  description: |
    The **Thane Compatibility API** lets external, non-Thane clients talk to
    Thane as if it were OpenAI or Ollama. It is a **frozen service promise**:
    the paths and shapes are dictated by the clients that depend on them —
    Home Assistant's conversation/voice integration and open-webui — not by
    Thane. They are documented here for reference and are deliberately **out of
    scope** for the loops-first reshape. For Thane's own management surface,
    see the Thane Native API.

    Two foreign shapes are served, on different ports:
    - **OpenAI-compatible** (`/v1/chat/completions`, `/v1/models`) — default port 8081.
    - **Ollama-compatible** (`/api/*`) — default port 11434.

    AuthN is a per-client bearer API key (`Authorization: Bearer <key>`);
    authorization is coarse (inference access), intentionally distinct from the
    native API's granular `resource:action` scopes.
  contact:
    name: Thane — nugget/thane-ai-agent
    url: https://github.com/nugget/thane-ai-agent
  license:
    name: Apache-2.0
    identifier: Apache-2.0

servers:
  - url: http://localhost:8081
    description: OpenAI-compatible surface
  - url: http://localhost:11434
    description: Ollama-compatible surface

security:
  - apiKey: []

tags:
  - name: openai
    description: OpenAI-compatible endpoints — generic OpenAI clients only (HA and open-webui use the Ollama surface).
  - name: ollama
    description: Ollama-compatible endpoints — HA integration, open-webui chat, model listing.

externalDocs:
  description: Source, architecture, and contributor guides on GitHub.
  url: https://github.com/nugget/thane-ai-agent/tree/main/docs

paths:
  /v1/chat/completions:
    post:
      tags: [openai]
      operationId: openaiChatCompletions
      summary: Chat completions (OpenAI shape)
      servers:
        - url: http://localhost:8081
      requestBody:
        description: The chat completion request — messages, model, and sampling options.
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatCompletionRequest" }
      responses:
        "200":
          description: A chat completion, or an SSE stream when `stream` is true.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatCompletionResponse" }
            text/event-stream:
              schema:
                type: string
                description: SSE stream of completion chunks (OpenAI delta format).
  /v1/models:
    get:
      tags: [openai]
      operationId: openaiListModels
      summary: List models (OpenAI shape)
      description: |
        OpenAI-shaped model list. Entries include Thane routing aliases
        (e.g. `thane:latest`, `thane:premium`) so OpenAI clients can target a
        routing profile by model id.
      servers:
        - url: http://localhost:8081
      responses:
        "200":
          description: Model list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelList" }

  /api/chat:
    post:
      tags: [ollama]
      operationId: ollamaChat
      summary: Chat (Ollama shape)
      servers:
        - url: http://localhost:11434
      requestBody:
        description: The Ollama chat request — model and messages.
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OllamaChatRequest" }
      responses:
        "200":
          description: Chat response; an NDJSON stream unless `stream` is false.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OllamaChatResponse" }
            application/x-ndjson:
              schema: { $ref: "#/components/schemas/OllamaChatResponse" }
  /api/generate:
    post:
      tags: [ollama]
      operationId: ollamaGenerate
      deprecated: true
      summary: Generate (Ollama shape) — not implemented
      description: |
        **Not implemented — always returns `501`.** Ollama's prompt-based
        generate endpoint has no consumer on this frozen surface: Home
        Assistant's Ollama integration and open-webui both drive Thane through
        `POST /api/chat`. Rather than misdecode a `{model, prompt}` body as an
        empty chat request and hand back a blank turn, the server rejects the
        call with `501` and points the client at `/api/chat`.
      servers:
        - url: http://localhost:11434
      responses:
        "501":
          description: Not implemented. Use `POST /api/chat` with a `messages` array.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OllamaError" }
  /api/tags:
    get:
      tags: [ollama]
      operationId: ollamaTags
      summary: List local models (Ollama shape)
      servers:
        - url: http://localhost:11434
      responses:
        "200":
          description: Installed/served models.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OllamaTags" }
  /api/version:
    get:
      tags: [ollama]
      operationId: ollamaVersion
      summary: Version (Ollama shape)
      servers:
        - url: http://localhost:11434
      responses:
        "200":
          description: Reported Ollama-compatible version string.
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string }

components:
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: Per-client API key. Coarse inference access (no granular scopes).
  schemas:
    ChatMessage:
      type: object
      description: One message in a chat exchange (OpenAI/Ollama shape).
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
          description: The role of the message author.
          example: user
        content:
          type: string
          description: The message text content.
          example: Turn on the office lights.
    ChatCompletionRequest:
      type: object
      description: OpenAI-compatible chat completion request.
      required: [model, messages]
      properties:
        model:
          type: string
          description: Model id or a Thane routing alias (e.g. `thane:latest`).
          example: thane:latest
        messages:
          type: array
          description: The conversation messages, in order.
          items: { $ref: "#/components/schemas/ChatMessage" }
        stream:
          type: boolean
          default: false
          description: Stream the response as Server-Sent Events instead of one JSON body.
        temperature:
          type: number
          description: Sampling temperature requested by the client.
          example: 0.7
        max_tokens:
          type: integer
          description: Maximum number of tokens to generate.
          example: 1024
    ChatCompletionResponse:
      type: object
      description: OpenAI-compatible chat completion response.
      properties:
        id:
          type: string
          description: Unique completion identifier.
          example: chatcmpl-abc123
        object:
          type: string
          description: Object type — always `chat.completion`.
          example: chat.completion
        created:
          type: integer
          description: Unix timestamp (seconds) when the completion was created.
          example: 1782735600
        model:
          type: string
          description: Model that produced the completion.
          example: thane:latest
        choices:
          type: array
          description: The generated completion choices (Thane returns a single choice).
          items:
            type: object
            properties:
              index:
                type: integer
                description: Position of this choice in the list.
                example: 0
              message: { $ref: "#/components/schemas/ChatMessage" }
              finish_reason:
                type: string
                description: Why generation stopped (e.g. stop, length).
                example: stop
        usage:
          type: object
          description: Token usage for the request.
          properties:
            prompt_tokens:
              type: integer
              description: Tokens in the prompt.
              example: 412
            completion_tokens:
              type: integer
              description: Tokens in the generated completion.
              example: 96
            total_tokens:
              type: integer
              description: Total tokens (prompt + completion).
              example: 508
    ModelList:
      type: object
      description: OpenAI-compatible list of available models.
      properties:
        object:
          type: string
          description: Object type — always `list`.
          example: list
        data:
          type: array
          description: The available models.
          items:
            type: object
            properties:
              id:
                type: string
                description: Model identifier.
                example: thane:latest
              object:
                type: string
                description: Object type — always `model`.
                example: model
              owned_by:
                type: string
                description: Owner of the model.
                example: thane
    OllamaChatRequest:
      type: object
      description: Ollama-compatible chat request.
      required: [model, messages]
      properties:
        model:
          type: string
          description: Model id or a Thane routing alias.
          example: thane:latest
        messages:
          type: array
          description: The conversation messages, in order.
          items: { $ref: "#/components/schemas/ChatMessage" }
        stream:
          type: boolean
          description: Stream the response as newline-delimited JSON objects.
    OllamaChatResponse:
      type: object
      description: Ollama-compatible chat response (one object per stream chunk).
      additionalProperties: true
      properties:
        model:
          type: string
          description: Model that produced the reply.
          example: thane:latest
        created_at:
          type: string
          description: RFC3339 timestamp when the reply was created.
          example: "2026-06-24T14:31:11Z"
        message: { $ref: "#/components/schemas/ChatMessage" }
        done:
          type: boolean
          description: Whether this is the final chunk of the streamed reply.
          example: true
    OllamaError:
      type: object
      description: Ollama-compatible error envelope.
      required: [error]
      properties:
        error:
          type: string
          description: Error message.
          example: model not found
    OllamaTags:
      type: object
      description: Ollama-compatible list of locally available models (the /api/tags response).
      properties:
        models:
          type: array
          description: The available models.
          items:
            type: object
            properties:
              name:
                type: string
                description: Model name (e.g. `thane:latest`).
                example: thane:latest
              model:
                type: string
                description: Model identifier.
                example: thane:latest
              size:
                type: integer
                format: int64
                description: Model size in bytes.
                example: 4709611008
