openapi: 3.1.0
info:
  title: Thane Native API
  version: 1.0.0-draft
  summary: First-party management & observability API for Thane's own clients.
  description: |
    The **Thane Native API** is the backend for Thane's own user interfaces —
    the built-in web dashboard today, and a `thane-agent-macos` native app
    next. It is organized **loops-first**: the agent loop is Thane's universal
    execution primitive, so the API leads with `/v1/loops` and hangs everything
    else (requests, conversations, models, telemetry) off that center.

    This is **not** a public or compatibility surface. The OpenAI- and
    Ollama-compatible endpoints that Home Assistant and open-webui consume are
    a separate, frozen product (the *Thane Compatibility API*) served on a
    different host/port. Keeping the two apart lets their security models
    diverge — see below.

    ## Security model (declared now, enforced in stages)

    Each operation below carries an `x-thane-scope` extension naming the
    permission it will require once authorization is enforced. Today the API is
    open behind the network boundary; the contract is declared first so the
    explorer, the UIs, and the eventual middleware all agree on the shape.

    - **AuthN:** bearer token (`Authorization: Bearer <token>`). The scheme is
      written OIDC-ready; tokens are minted directly for now.
    - **AuthZ scopes** are `resource:action`:
      `loops:read`, `definitions:read`, `definitions:write`, `requests:read`,
      `schedules:read`, `conversations:read`, `sessions:read`, `sessions:write`,
      `archive:read`,
      `checkpoints:read`, `checkpoints:write`, `models:read`, `models:admin`,
      `insights:read`, `contacts:read`, `contacts:write`, `system:read`.
    - **Roles** bundle scopes: `observer` (all `:read`), `operator`
      (observer + `definitions:write`, `sessions:write`, `checkpoints:write`),
      `admin` (everything, incl. `models:admin`, `contacts:write`).

    CORS is a per-surface concern: the native API allowlists the UI origins
    (credentialed, cross-origin since the hosts differ); the compatibility API
    has its own, narrower policy.
  contact:
    name: Thane — nugget/thane-ai-agent
    url: https://github.com/nugget/thane-ai-agent
  license:
    name: Apache-2.0
    identifier: Apache-2.0

servers:
  - url: http://localhost:8080
    description: Local development (native API + web UI)
  # In production the native API is fronted by a reverse proxy on its own host,
  # separate from the compatibility API; each deployment sets its public URL.

security:
  - bearerAuth: []

tags:
  - name: Loops
    description: Active executions — the universal primitive. Start here.
  - name: Loop Definitions
    description: The persisted templates that loops are launched from.
  - name: Requests
    description: A single model turn, with its routing and tool-call facets.
  - name: Conversations & Sessions
    description: Live dialogue transcripts and context-window management.
  - name: Archive
    description: Historical sessions with full-text search and export.
  - name: Checkpoints
    description: Conversation state snapshots for restart survival.
  - name: Scheduler
    description: Durable scheduled tasks and their execution history.
  - name: Models & Fleet
    description: Available models and the routing/registry policy.
  - name: Insights
    description: Read-only aggregate telemetry — routing, tools, usage, capabilities.
  - name: Contacts
    description: Address book (also synced via CardDAV on a separate surface).
  - name: System
    description: Health, version, and process logs.
  - name: Realtime
    description: WebSocket channel for first-party live interaction.

externalDocs:
  description: Source, architecture, and contributor guides on GitHub.
  url: https://github.com/nugget/thane-ai-agent/tree/main/docs

# Sidebar grouping for the Scalar explorer. Every tag above belongs to exactly
# one group; the groups order the /docs navigation by domain.
x-tagGroups:
  - name: Execution
    tags: [Loops, Loop Definitions, Requests, Scheduler]
  - name: Memory & History
    tags: [Conversations & Sessions, Archive, Checkpoints]
  - name: Models & Insights
    tags: [Models & Fleet, Insights]
  - name: Platform
    tags: [Contacts, System, Realtime]

paths:
  # ----------------------------------------------------------------- System
  /health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Liveness probe
      description: Unversioned, unauthenticated liveness check for load balancers.
      security: []
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
  /v1/version:
    get:
      tags: [System]
      operationId: getVersion
      summary: Build and runtime metadata
      x-thane-scope: system:read
      responses:
        "200":
          description: Version info.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionInfo" }
  /v1/system:
    get:
      tags: [System]
      operationId: getSystem
      summary: System health, uptime, and version rollup
      description: Replaces the dashboard-private `/api/system`.
      x-thane-scope: system:read
      responses:
        "200":
          description: System status snapshot.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SystemStatus" }
  /v1/system/logs:
    get:
      tags: [System]
      operationId: getSystemLogs
      summary: Tail the structured process log
      x-thane-scope: system:read
      parameters:
        - $ref: "#/components/parameters/Limit"
        - { name: level, in: query, schema: { type: string, enum: [debug, info, warn, error] } }
      responses:
        "200":
          description: Log entries (newest first).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LogEntry" }

  # -------------------------------------------------------------------- Chat
  /v1/chat:
    post:
      tags: [Loops]
      operationId: simpleChat
      summary: Simple synchronous chat (one message in, one reply out)
      description: |
        A minimal first-party chat turn: post a message, get the assistant's
        reply once the agent loop finishes. The richer OpenAI-shaped streaming
        surface lives in the Compatibility API, not here.
      x-thane-scope: sessions:write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
                conversation_id: { type: string }
              required: [message]
      responses:
        "200":
          description: Assistant reply.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response: { type: string }
                  model: { type: string }
                  conversation_id: { type: string }
                  tool_calls: { type: array, items: { type: string } }
        "400": { $ref: "#/components/responses/BadRequest" }

  # ------------------------------------------------------------------ Loops
  /v1/loops:
    get:
      tags: [Loops]
      operationId: listLoops
      summary: List active executions
      description: |
        Every loop the registry currently tracks, across all run shapes —
        autonomous service loops, request/reply, background tasks, and
        event-driven consumers. Replaces the dashboard-private `/api/loops`.
      x-thane-scope: loops:read
      parameters:
        - { name: state, in: query, description: Filter by lifecycle state.,
            schema: { $ref: "#/components/schemas/LoopState" } }
      responses:
        "200":
          description: Loop status snapshots.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LoopStatus" }
  /v1/loops/{id}:
    get:
      tags: [Loops]
      operationId: getLoop
      summary: One execution's detail
      x-thane-scope: loops:read
      parameters:
        - $ref: "#/components/parameters/LoopId"
      responses:
        "200":
          description: Loop status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoopStatus" }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/loops/{id}/logs:
    get:
      tags: [Loops]
      operationId: getLoopLogs
      summary: Log entries scoped to this loop
      description: Replaces `/api/loops/{id}/logs`.
      x-thane-scope: loops:read
      parameters:
        - $ref: "#/components/parameters/LoopId"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Log entries (newest first).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LogEntry" }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/loops/events:
    get:
      tags: [Loops]
      operationId: streamLoopEvents
      summary: Live loop lifecycle stream (SSE)
      description: |
        Server-Sent Events stream of loop lifecycle changes (started, woke,
        slept, errored, stopped). Replaces `/api/loops/events`. The response is
        `text/event-stream`; each event's `data:` is a JSON
        `LoopEvent`. OpenAPI cannot fully model SSE — treat the schema as the
        per-event payload.
      x-thane-scope: loops:read
      responses:
        "200":
          description: An open event stream.
          content:
            text/event-stream:
              schema: { $ref: "#/components/schemas/LoopEvent" }

  # --------------------------------------------------------- Scheduler
  /v1/schedules:
    get:
      tags: [Scheduler]
      operationId: listSchedules
      summary: Scheduled tasks
      description: |
        The durable scheduler's tasks — `at`/`every`/`cron` triggers and their
        payloads — each augmented with its next computed fire time. Surfaces the
        previously internal-only scheduler subsystem.
      x-thane-scope: schedules:read
      parameters:
        - { name: enabled, in: query, description: Return only enabled tasks when true.,
            schema: { type: boolean } }
      responses:
        "200":
          description: Scheduled tasks (newest first).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ScheduledTask" }
  /v1/schedules/{id}:
    get:
      tags: [Scheduler]
      operationId: getSchedule
      summary: One scheduled task
      x-thane-scope: schedules:read
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "200":
          description: Scheduled task.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScheduledTask" }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/schedules/{id}/executions:
    get:
      tags: [Scheduler]
      operationId: getScheduleExecutions
      summary: Execution history for a scheduled task
      x-thane-scope: schedules:read
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Execution records (newest first).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ScheduleExecution" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----------------------------------------------------- Loop Definitions
  /v1/loop-definitions:
    get:
      tags: [Loop Definitions]
      operationId: listLoopDefinitions
      summary: List loop definitions with live runtime state
      description: |
        The single canonical loop-definition surface, replacing the
        dashboard-private `/api/loop-definitions` and the embedded
        `/api/system` field. Each entry pairs the stored definition with its
        eligibility, runtime state, warnings, and post-inheritance effective
        state. Distinct from `/v1/loops` (running instances): this is the
        durable spec registry.
      x-thane-scope: definitions:read
      responses:
        "200":
          description: Definition registry view.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefinitionRegistryView" }
    post:
      tags: [Loop Definitions]
      operationId: createLoopDefinition
      summary: Create or replace a loop definition
      x-thane-scope: definitions:write
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoopDefinitionSpec" }
      responses:
        "201":
          description: Definition stored.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefinitionView" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/loop-definitions/{name}:
    get:
      tags: [Loop Definitions]
      operationId: getLoopDefinition
      summary: Fetch one definition
      x-thane-scope: definitions:read
      parameters:
        - $ref: "#/components/parameters/DefinitionName"
      responses:
        "200":
          description: Definition view.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefinitionView" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Loop Definitions]
      operationId: deleteLoopDefinition
      summary: Delete a definition
      x-thane-scope: definitions:write
      parameters:
        - $ref: "#/components/parameters/DefinitionName"
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/loop-definitions/{name}/launch:
    post:
      tags: [Loop Definitions]
      operationId: launchLoopDefinition
      summary: Launch a definition into a running loop
      x-thane-scope: definitions:write
      parameters:
        - $ref: "#/components/parameters/DefinitionName"
      responses:
        "202":
          description: Launch accepted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  loop_id: { type: string }
                  name: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/loop-definitions/policy:
    post:
      tags: [Loop Definitions]
      operationId: setLoopDefinitionPolicy
      summary: Set launch policy (e.g. pause a definition)
      x-thane-scope: definitions:write
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DefinitionPolicy" }
      responses:
        "200": { description: Policy applied. }
    delete:
      tags: [Loop Definitions]
      operationId: clearLoopDefinitionPolicy
      summary: Clear a launch policy override
      x-thane-scope: definitions:write
      parameters:
        - { name: name, in: query, required: true, schema: { type: string } }
      responses:
        "204": { description: Cleared. }

  # --------------------------------------------------------------- Requests
  /v1/requests/{id}:
    get:
      tags: [Requests]
      operationId: getRequest
      summary: Detail for a single model turn
      description: Replaces `/api/requests/{id}`.
      x-thane-scope: requests:read
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Request detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequestDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/requests/{id}/routing:
    get:
      tags: [Requests]
      operationId: getRequestRouting
      summary: Why this model was chosen
      description: |
        The router's decision trace for this request. Replaces
        `/v1/router/explain/{requestId}` — routing is a facet of the request,
        not a free-standing subsystem.
      x-thane-scope: requests:read
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Routing explanation.
          content:
            application/json:
              schema: { type: object, description: "Router decision trace (schema first-pass; tighten against handler)." }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/requests/{id}/tools:
    get:
      tags: [Requests]
      operationId: getRequestTools
      summary: Tool calls made during this request
      x-thane-scope: requests:read
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Tool-call records.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ToolDetail" }

  # ---------------------------------------------- Conversations & Sessions
  /v1/conversations:
    get:
      tags: [Conversations & Sessions]
      operationId: listConversations
      summary: List, filter, search, and paginate conversation summaries
      description: >
        Returns lightweight conversation summaries (no message content),
        filtered/sorted/keyset-paginated. message_count is the true active
        message count. q matches conversation metadata only (id, contact name,
        address) — for message-content search use /v1/archive/search.
      x-thane-scope: conversations:read
      parameters:
        - { name: ids, in: query, description: "Comma-separated exact conversation ids (max 200).", schema: { type: string } }
        - { name: kind, in: query, description: "Comma-separated id-prefix families, e.g. signal,sched (matches '<kind>-…').", schema: { type: string } }
        - { name: channel, in: query, description: "Filter by channel binding channel (e.g. signal).", schema: { type: string } }
        - { name: contact, in: query, description: "Filter by channel binding contact id.", schema: { type: string } }
        - { name: address, in: query, description: "Filter by channel binding address.", schema: { type: string } }
        - { name: q, in: query, description: "Substring match over id, contact name, and address (metadata only).", schema: { type: string } }
        - { name: updated_after, in: query, description: "RFC3339 timestamp or a duration meaning 'ago' (e.g. 1h, 24h).", schema: { type: string } }
        - { name: updated_before, in: query, schema: { type: string } }
        - { name: created_after, in: query, schema: { type: string } }
        - { name: created_before, in: query, schema: { type: string } }
        - { name: min_messages, in: query, schema: { type: integer, minimum: 0 } }
        - { name: max_messages, in: query, schema: { type: integer, minimum: 0 } }
        - { name: sort, in: query, schema: { type: string, enum: [updated_at, created_at, message_count], default: updated_at } }
        - { name: order, in: query, schema: { type: string, enum: [asc, desc], default: desc } }
        - { name: limit, in: query, description: "Page size.", schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
        - { name: cursor, in: query, description: "Opaque keyset cursor from a prior next_cursor; valid only for the same sort/order.", schema: { type: string } }
      responses:
        "200":
          description: A page of conversation summaries.
          content:
            application/json:
              schema:
                type: object
                required: [conversations, count, total, next_cursor]
                properties:
                  conversations:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        message_count: { type: integer }
                        created_at: { type: string, format: date-time }
                        updated_at: { type: string, format: date-time }
                        channel_binding: { type: [object, "null"] }
                  count: { type: integer }
                  total: { type: integer }
                  next_cursor: { type: [string, "null"] }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/conversations/{id}:
    get:
      tags: [Conversations & Sessions]
      operationId: getConversation
      summary: Fetch a conversation transcript
      x-thane-scope: conversations:read
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Conversation transcript.
          content:
            application/json:
              schema: { type: object }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/sessions/stats:
    get:
      tags: [Conversations & Sessions]
      operationId: getSessionStats
      summary: Context / session statistics
      x-thane-scope: sessions:read
      responses:
        "200":
          description: Session stats.
          content: { application/json: { schema: { type: object } } }
  /v1/sessions/history:
    get:
      tags: [Conversations & Sessions]
      operationId: getSessionHistory
      summary: Session history
      x-thane-scope: sessions:read
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: History entries.
          content: { application/json: { schema: { type: array, items: { type: object } } } }
  /v1/sessions/compact:
    post:
      tags: [Conversations & Sessions]
      operationId: compactSession
      summary: Compact the active context window
      x-thane-scope: sessions:write
      responses:
        "200": { description: Compaction performed. }
  /v1/sessions/balance:
    post:
      tags: [Conversations & Sessions]
      operationId: balanceSession
      summary: Rebalance the active context
      x-thane-scope: sessions:write
      responses:
        "200": { description: Rebalanced. }
  /v1/sessions/reset:
    post:
      tags: [Conversations & Sessions]
      operationId: resetSession
      summary: Reset the active session
      x-thane-scope: sessions:write
      responses:
        "200": { description: Reset. }

  # ---------------------------------------------------------------- Archive
  /v1/archive/sessions:
    get:
      tags: [Archive]
      operationId: listArchivedSessions
      summary: List archived sessions
      x-thane-scope: archive:read
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Archived session summaries.
          content: { application/json: { schema: { type: array, items: { type: object } } } }
  /v1/archive/sessions/{id}:
    get:
      tags: [Archive]
      operationId: getArchivedSession
      summary: Fetch one archived session
      x-thane-scope: archive:read
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Archived session., content: { application/json: { schema: { type: object } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/archive/sessions/{id}/export:
    get:
      tags: [Archive]
      operationId: exportArchivedSession
      summary: Export an archived session (e.g. Markdown)
      x-thane-scope: archive:read
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Exported document.
          content:
            text/markdown: { schema: { type: string } }
  /v1/archive/messages:
    get:
      tags: [Archive]
      operationId: listArchivedMessages
      summary: List archived messages
      x-thane-scope: archive:read
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200": { description: Messages., content: { application/json: { schema: { type: array, items: { type: object } } } } }
  /v1/archive/search:
    get:
      tags: [Archive]
      operationId: searchArchive
      summary: Full-text search across archived sessions
      x-thane-scope: archive:read
      parameters:
        - { name: q, in: query, required: true, description: FTS5 query string., schema: { type: string } }
        - $ref: "#/components/parameters/Limit"
      responses:
        "200": { description: Search results., content: { application/json: { schema: { type: array, items: { type: object } } } } }
  /v1/archive/stats:
    get:
      tags: [Archive]
      operationId: getArchiveStats
      summary: Archive size and coverage stats
      x-thane-scope: archive:read
      responses:
        "200": { description: Stats., content: { application/json: { schema: { type: object } } } }

  # ------------------------------------------------------------ Checkpoints
  /v1/checkpoints:
    get:
      tags: [Checkpoints]
      operationId: listCheckpoints
      summary: List checkpoints
      x-thane-scope: checkpoints:read
      responses:
        "200": { description: Checkpoints., content: { application/json: { schema: { type: array, items: { type: object } } } } }
    post:
      tags: [Checkpoints]
      operationId: createCheckpoint
      summary: Create a checkpoint
      x-thane-scope: checkpoints:write
      responses:
        "201": { description: Created., content: { application/json: { schema: { type: object } } } }
  /v1/checkpoints/{id}:
    get:
      tags: [Checkpoints]
      operationId: getCheckpoint
      summary: Fetch a checkpoint
      x-thane-scope: checkpoints:read
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      responses:
        "200": { description: Checkpoint., content: { application/json: { schema: { type: object } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Checkpoints]
      operationId: deleteCheckpoint
      summary: Delete a checkpoint
      x-thane-scope: checkpoints:write
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      responses:
        "204": { description: Deleted. }
  /v1/checkpoints/{id}/restore:
    post:
      tags: [Checkpoints]
      operationId: restoreCheckpoint
      summary: Restore from a checkpoint
      x-thane-scope: checkpoints:write
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      responses:
        "200": { description: Restored. }
        "404": { $ref: "#/components/responses/NotFound" }

  # -------------------------------------------------------- Models & Fleet
  /v1/models:
    get:
      tags: [Models & Fleet]
      operationId: listModels
      summary: Available models (native fleet view)
      description: |
        The native, richer fleet view (resources, capabilities, health) for
        the UIs. NOT the OpenAI-shaped model list — that lives in the
        Compatibility API.
      x-thane-scope: models:read
      responses:
        "200": { description: Models., content: { application/json: { schema: { type: array, items: { type: object } } } } }
  /v1/models/registry:
    get:
      tags: [Models & Fleet]
      operationId: getModelRegistry
      summary: Model-registry snapshot
      x-thane-scope: models:read
      responses:
        "200": { description: Registry snapshot., content: { application/json: { schema: { type: object } } } }
  /v1/models/registry/policy:
    put:
      tags: [Models & Fleet]
      operationId: setModelPolicy
      summary: Set a model routing policy
      x-thane-scope: models:admin
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses: { "200": { description: Applied. } }
    delete:
      tags: [Models & Fleet]
      operationId: clearModelPolicy
      summary: Clear a model routing policy
      x-thane-scope: models:admin
      responses: { "204": { description: Cleared. } }
  /v1/models/registry/resource-policy:
    put:
      tags: [Models & Fleet]
      operationId: setResourcePolicy
      summary: Set a resource (host) policy
      x-thane-scope: models:admin
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses: { "200": { description: Applied. } }
    delete:
      tags: [Models & Fleet]
      operationId: clearResourcePolicy
      summary: Clear a resource policy
      x-thane-scope: models:admin
      responses: { "204": { description: Cleared. } }

  # ------------------------------------------------------------- Insights
  /v1/insights/router:
    get:
      tags: [Insights]
      operationId: getRouterInsights
      summary: Router stats and recent audit
      description: Consolidates `/v1/router/stats` and `/v1/router/audit`.
      x-thane-scope: insights:read
      responses:
        "200": { description: Router insights., content: { application/json: { schema: { type: object } } } }
  /v1/insights/tools:
    get:
      tags: [Insights]
      operationId: getToolInsights
      summary: Tool-call stats and recent calls
      description: Consolidates `/v1/tools/stats` and `/v1/tools/calls`.
      x-thane-scope: insights:read
      responses:
        "200": { description: Tool insights., content: { application/json: { schema: { type: object } } } }
  /v1/insights/usage:
    get:
      tags: [Insights]
      operationId: getUsageInsights
      summary: Token / cost usage summary
      description: Was `/v1/usage/summary`.
      x-thane-scope: insights:read
      parameters:
        - { name: hours, in: query, schema: { type: integer, default: 24 } }
        - { name: group_by, in: query, description: "Break the summary down by a dimension (e.g. model); omit for an ungrouped total.", schema: { type: string } }
      responses:
        "200": { description: "Usage summary (grouped when group_by is set).", content: { application/json: { schema: { type: object } } } }
  /v1/insights/capabilities:
    get:
      tags: [Insights]
      operationId: listCapabilities
      summary: Resolved capability-tag catalog
      description: Was the dashboard-private `/api/capabilities`.
      x-thane-scope: insights:read
      responses:
        "200": { description: Capability catalog., content: { application/json: { schema: { type: object } } } }
  /v1/insights/capabilities/{tag}:
    get:
      tags: [Insights]
      operationId: getCapability
      summary: One capability tag's resolved view
      x-thane-scope: insights:read
      parameters: [ { name: tag, in: path, required: true, schema: { type: string } } ]
      responses:
        "200": { description: Capability entry., content: { application/json: { schema: { type: object } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # -------------------------------------------------------------- Contacts
  /v1/contacts:
    get:
      tags: [Contacts]
      operationId: listContacts
      summary: List contacts
      x-thane-scope: contacts:read
      responses:
        "200": { description: Contacts., content: { application/json: { schema: { type: array, items: { type: object } } } } }
    post:
      tags: [Contacts]
      operationId: createContact
      summary: Create a contact
      x-thane-scope: contacts:write
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "201": { description: Created., content: { application/json: { schema: { type: object } } } }
  /v1/contacts/{id}:
    get:
      tags: [Contacts]
      operationId: getContact
      summary: Fetch a contact
      x-thane-scope: contacts:read
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      responses:
        "200": { description: Contact., content: { application/json: { schema: { type: object } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Contacts]
      operationId: updateContact
      summary: Update a contact
      x-thane-scope: contacts:write
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "200": { description: Updated. }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Contacts]
      operationId: deleteContact
      summary: Delete a contact
      x-thane-scope: contacts:write
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      responses:
        "204": { description: Deleted. }

  # -------------------------------------------------------------- Realtime
  /v1/realtime/ws:
    get:
      tags: [Realtime]
      operationId: realtimeWebSocket
      summary: First-party realtime channel (WebSocket upgrade)
      description: |
        WebSocket endpoint for live interaction from first-party clients (the
        web UI and the macOS app). Unifies the pre-reshape `/v1/companion/ws`
        and `/v1/platform/ws`, which shared one handler. This is a protocol
        upgrade, not a JSON response — OpenAPI documents it for discovery only.
      x-thane-scope: loops:read
      responses:
        "101": { description: Switching Protocols (WebSocket). }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer token. Written OIDC-ready; minted directly for now. The
        per-operation `x-thane-scope` extension names the scope the token must
        carry once authorization is enforced.

  parameters:
    LoopId:
      name: id
      in: path
      required: true
      description: Loop ID (e.g. `019e7469-3abf-7e6b-ae38-85b5e34915ac`).
      schema: { type: string }
    DefinitionName:
      name: name
      in: path
      required: true
      description: Loop definition name (e.g. `cota_weekend_observer`).
      schema: { type: string }
    RequestId:
      name: id
      in: path
      required: true
      description: Request ID (e.g. `r_84dc5155c60d97be`).
      schema: { type: string }
    ScheduleId:
      name: id
      in: path
      required: true
      description: Scheduled task ID (UUIDv7).
      schema: { type: string }
    Limit:
      name: limit
      in: query
      description: Maximum number of items to return.
      schema: { type: integer, minimum: 1, default: 50 }
    Offset:
      name: offset
      in: query
      description: Number of items to skip.
      schema: { type: integer, minimum: 0, default: 0 }

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]

    VersionInfo:
      type: object
      additionalProperties: { type: string }
      description: Build/runtime key-value metadata (version, commit, go version...).

    LogEntry:
      type: object
      description: One structured log row (schema first-pass; tighten against logging.LogEntry).
      properties:
        ts: { type: string, format: date-time }
        level: { type: string }
        msg: { type: string }
        request_id: { type: string }
        conversation_id: { type: string }
      additionalProperties: true

    SystemStatus:
      type: object
      description: Health, uptime, version, and snapshots for the system view.
      properties:
        uptime_seconds: { type: integer }
        version: { $ref: "#/components/schemas/VersionInfo" }
        health:
          type: object
          additionalProperties: { $ref: "#/components/schemas/ServiceHealth" }
      additionalProperties: true
    ServiceHealth:
      type: object
      properties:
        name: { type: string }
        ready: { type: boolean }
        last_check: { type: string, format: date-time }
        last_error: { type: string }
      required: [name, ready]

    LoopState:
      type: string
      enum: [pending, sleeping, waiting, processing, error, stopped]
      readOnly: true
      description: >-
        Lifecycle state of a loop: pending (registered but not yet started),
        sleeping (between iterations awaiting the next wake), waiting (blocked
        on a WaitFunc for an external event), processing (actively running an
        iteration), error (last iteration failed and will retry), or stopped
        (cancelled and no longer running).
      example: processing
    LoopStatus:
      type: object
      description: Snapshot of a loop's current lifecycle state and cumulative metrics, suitable for external inspection via the registry.
      properties:
        id:
          type: string
          description: Unique identifier of the loop.
          readOnly: true
          example: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        name:
          type: string
          description: Human-readable name of the loop.
          readOnly: true
          example: signal-interactive
        state: { $ref: "#/components/schemas/LoopState" }
        parent_id:
          type: string
          description: Identifier of the parent loop, when this loop was spawned as a delegate.
          readOnly: true
          example: 019e7468-1c2d-7a90-b3ef-2f0a9c4d5e6f
        started_at:
          type: string
          format: date-time
          description: Time the loop was started.
          readOnly: true
          example: "2026-06-24T14:03:21Z"
        last_wake_at:
          type: string
          format: date-time
          description: Time the loop last began an iteration.
          readOnly: true
          example: "2026-06-24T14:31:07Z"
        iterations:
          type: integer
          description: Total number of completed (successful) iterations.
          readOnly: true
          example: 142
        attempts:
          type: integer
          description: Total number of iteration attempts, including failures.
          readOnly: true
          example: 145
        total_input_tokens:
          type: integer
          format: int64
          description: Cumulative input tokens consumed across all iterations.
          readOnly: true
          example: 1284532
        total_output_tokens:
          type: integer
          format: int64
          description: Cumulative output tokens produced across all iterations.
          readOnly: true
          example: 318204
        last_input_tokens:
          type: integer
          description: Input token count from the most recent iteration.
          readOnly: true
          example: 9123
        last_output_tokens:
          type: integer
          description: Output token count from the most recent iteration.
          readOnly: true
          example: 2048
        context_window:
          type: integer
          description: Maximum context size, in tokens, of the model used.
          readOnly: true
          example: 200000
        last_error:
          type: string
          description: Error message from the most recent failed iteration.
          readOnly: true
          example: "model request timed out"
        consecutive_errors:
          type: integer
          description: Number of consecutive failed iterations.
          readOnly: true
          example: 0
        recent_conv_ids:
          type: array
          items: { type: string }
          description: Conversation IDs from the most recent iterations (up to 10, newest first), used to scope log queries to this loop.
          readOnly: true
          example: ["019e7469-3abf-7e6b-ae38-85b5e34915ac", "019e7469-1a2b-7c3d-9e4f-0a1b2c3d4e5f"]
        handler_only:
          type: boolean
          description: True when the loop runs a Handler instead of LLM iterations and therefore reports no token metrics.
          readOnly: true
          example: false
        event_driven:
          type: boolean
          description: True when the loop is event-driven (blocks on notification arrivals) rather than timer-based.
          readOnly: true
          example: false
        recent_iterations:
          type: array
          items: { $ref: "#/components/schemas/IterationSnapshot" }
          description: Up to 10 completed iteration snapshots (newest first), used by the dashboard timeline.
          readOnly: true
      required: [id, name, state, started_at, iterations, attempts, total_input_tokens, total_output_tokens, consecutive_errors]
    IterationSnapshot:
      type: object
      description: Serializable summary of a single completed loop iteration, retained in a ring buffer for the dashboard timeline.
      properties:
        number:
          type: integer
          description: 1-based iteration number, matching the loop's cumulative iteration counter at the time of completion.
          readOnly: true
          example: 142
        conv_id:
          type: string
          description: Conversation ID used for this iteration.
          readOnly: true
          example: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        request_id:
          type: string
          description: Agent-generated request ID linking to log_request_content for prompt/response inspection.
          readOnly: true
          example: 019e7469-7b8c-7d9e-af01-23456789abcd
        model:
          type: string
          description: LLM model used for this iteration.
          readOnly: true
          example: claude-opus-4-8
        input_tokens:
          type: integer
          description: Input tokens consumed by this iteration.
          readOnly: true
          example: 9123
        output_tokens:
          type: integer
          description: Output tokens produced by this iteration.
          readOnly: true
          example: 2048
        context_window:
          type: integer
          description: Model's maximum context size, in tokens.
          readOnly: true
          example: 200000
        tools_used:
          type: object
          additionalProperties: { type: integer }
          description: Map of tool names to the number of times each was invoked during this iteration.
          readOnly: true
          example: { "log_search": 2, "send_message": 1 }
        effective_tools:
          type: array
          items: { type: string }
          description: Tools visible to the model for this turn.
          readOnly: true
          example: ["log_search", "send_message", "loop_status"]
        active_tags:
          type: array
          items: { type: string }
          description: Capability tags active for this turn.
          readOnly: true
          example: ["messaging", "retrospection"]
        tooling:
          type: object
          additionalProperties: true
          description: Tool-availability snapshot for the turn (which tools were exposed, and why).
          readOnly: true
        elapsed_ms:
          type: integer
          format: int64
          description: Wall-clock duration of the iteration, in milliseconds.
          readOnly: true
          example: 4213
        supervisor:
          type: boolean
          description: True when this iteration ran a supervisor turn.
          readOnly: true
          example: false
        supervisor_trigger:
          type: string
          description: >-
            Cause of the supervisor turn — empty for a normal turn, "random"
            for a Bernoulli win, or "forced" for a notification-driven turn.
          readOnly: true
          example: random
        error:
          type: string
          description: Error message if the iteration failed.
          readOnly: true
          example: "model request timed out"
        started_at:
          type: string
          format: date-time
          description: Time the iteration began.
          readOnly: true
          example: "2026-06-24T14:31:07Z"
        completed_at:
          type: string
          format: date-time
          description: Time the iteration finished.
          readOnly: true
          example: "2026-06-24T14:31:11Z"
        sleep_after_ms:
          type: integer
          format: int64
          description: Computed sleep duration following this iteration, in milliseconds; zero for WaitFunc-based loops.
          readOnly: true
          example: 30000
        wait_after:
          type: boolean
          description: True when the loop entered WaitFunc after this iteration instead of sleeping.
          readOnly: true
          example: false
        summary:
          type: object
          additionalProperties: true
          description: Handler-reported metrics for this iteration, written by handlers during execution as small scalar values.
          readOnly: true
          example: { "messages_processed": 3 }
      required: [number, elapsed_ms, started_at, completed_at]
    LoopEvent:
      type: object
      description: >-
        A single loop lifecycle event streamed over the /v1/loops/events SSE
        channel (the loopEvent wire envelope). The SSE `event:` line carries
        the source ("loop" or "delegate"); this object is the `data:` payload.
      properties:
        kind:
          type: string
          description: >-
            Event kind identifying the lifecycle transition (e.g. loop_started,
            loop_iteration_start, loop_iteration_complete, loop_sleep_start,
            loop_wait_start, loop_state_change, loop_error, loop_tool_start,
            loop_tool_done, loop_llm_start, loop_llm_response).
          readOnly: true
          example: loop_iteration_complete
        ts:
          type: string
          format: date-time
          description: Time the event occurred.
          readOnly: true
          example: "2026-06-24T14:31:11Z"
        data:
          type: object
          additionalProperties: true
          description: >-
            Kind-specific key/value payload. The loop always injects loop_id
            and loop_name; remaining keys depend on the event kind (e.g.
            model, input_tokens, output_tokens, elapsed_ms, tools_used for
            loop_iteration_complete; from, to for loop_state_change; error for
            loop_error). Omitted when there are no event fields.
          readOnly: true
          example: { "loop_id": "019e7469-3abf-7e6b-ae38-85b5e34915ac", "loop_name": "signal-interactive", "model": "claude-opus-4-8", "input_tokens": 9123, "output_tokens": 2048, "elapsed_ms": 4213 }
      required: [kind, ts]
    DefinitionRegistryView:
      type: object
      description: Effective combined view of stored loop definitions plus their current live runtime state.
      properties:
        generation:
          type: integer
          format: int64
          description: Monotonic registry generation counter, bumped each time the effective definition set changes.
          readOnly: true
          example: 42
        updated_at:
          type: string
          format: date-time
          description: Timestamp at which the underlying definition registry snapshot was last updated.
          readOnly: true
          example: "2026-06-24T18:57:13Z"
        config_definitions:
          type: integer
          description: Number of definitions sourced from immutable config-file input.
          readOnly: true
          example: 7
        overlay_definitions:
          type: integer
          description: Number of definitions sourced from the mutable persistent overlay.
          readOnly: true
          example: 3
        running_definitions:
          type: integer
          description: Number of definitions that currently have a live backing loop instance running.
          readOnly: true
          example: 2
        definitions_with_warnings:
          type: integer
          description: Number of definitions that produced at least one warning during view construction.
          readOnly: true
          example: 1
        warning_count:
          type: integer
          description: Total number of warnings across all definitions in the view.
          readOnly: true
          example: 3
        by_policy_state:
          type: object
          additionalProperties: { type: integer }
          description: Count of definitions grouped by their effective policy state (active, paused, inactive).
          readOnly: true
          example: { active: 8, inactive: 2 }
        by_eligibility_state:
          type: object
          additionalProperties: { type: integer }
          description: Count of definitions grouped by their effective eligibility state (eligible, ineligible).
          readOnly: true
          example: { eligible: 9, ineligible: 1 }
        by_runtime_state:
          type: object
          additionalProperties: { type: integer }
          description: Count of definitions grouped by their current runtime lifecycle state (e.g. running, not_running).
          readOnly: true
          example: { running: 2, not_running: 8 }
        definitions:
          type: array
          description: Per-definition combined stored-and-runtime views.
          items: { $ref: "#/components/schemas/DefinitionView" }
    DefinitionView:
      type: object
      description: One stored definition combined with its eligibility, live runtime status, warnings, and effective post-merge state.
      properties:
        eligibility:
          type: object
          additionalProperties: true
          description: Effective eligibility evaluation for this definition, including whether it may run and why.
          readOnly: true
        runtime:
          type: object
          additionalProperties: true
          description: Live runtime status of the backing loop instance for this definition (running flag, state, counters, last error).
          readOnly: true
        warnings:
          type: array
          items: { type: object }
          description: Warnings produced while validating or rendering this definition's spec.
          readOnly: true
        effective:
          type: object
          additionalProperties: true
          description: Post-ancestor-merge state for inheritable fields (tags, subscriptions, exclude_tools, routing factors, delegation gating); absent when there is nothing meaningful to report.
          readOnly: true
      additionalProperties: true
    LoopDefinitionSpec:
      type: object
      description: Persistable loop definition payload (name, operation, sleep envelope, subscriptions, tags, profile, ...). First-pass permissive schema; tighten against loop.Spec / loop.DefinitionSnapshot.
      properties:
        name:
          type: string
          description: Unique identifier of the loop definition.
          example: research_assistant
        operation:
          type: string
          enum: [request_reply, background_task, service, container, event_driven]
          description: Runtime operation pattern the loop follows.
          example: service
      required: [name]
      additionalProperties: true
    DefinitionPolicy:
      type: object
      description: Set-policy request body for one loop definition (target name, desired state, optional reason). Wraps loop.DefinitionPolicy plus the target name.
      properties:
        name:
          type: string
          description: Name of the loop definition this policy overlay targets.
          example: research_assistant
        state:
          type: string
          enum: [active, paused, inactive]
          description: Desired effective runtime state for the definition.
          example: paused
      required: [name, state]
    RequestDetail:
      type: object
      description: Full retained content for a single model request, ready for JSON serialization by the web API.
      properties:
        request_id:
          type: string
          description: Opaque identifier of the request this detail belongs to (a UUIDv7 in the common path; not guaranteed to be a UUID).
          readOnly: true
          example: "019e7469-3abf-7e6b-ae38-85b5e34915ac"
        prompt_hash:
          type: string
          description: Hash of the resolved prompt for this request, used to detect identical prompts.
          readOnly: true
          example: "sha256:9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08"
        system_prompt:
          type: string
          description: System prompt text supplied to the model for this request.
          readOnly: true
          example: "You are Thane, a helpful home assistant."
        messages:
          type: array
          items: { $ref: "#/components/schemas/MessageDetail" }
          description: Provider-neutral chat messages sent to the model for this request.
          readOnly: true
        user_content:
          type: string
          description: Flattened user-authored content extracted from the request.
          readOnly: true
          example: "What's the weather like today?"
        assistant_content:
          type: string
          description: Flattened assistant-authored content produced for this request.
          readOnly: true
          example: "It's currently 72 degrees and sunny."
        model:
          type: string
          description: Identifier of the model that served the request.
          readOnly: true
          example: "claude-opus-4-8"
        iteration_count:
          type: integer
          format: int64
          description: Number of model loop iterations executed while handling the request.
          readOnly: true
          example: 3
        input_tokens:
          type: integer
          format: int64
          description: Total input (prompt) tokens consumed across the request.
          readOnly: true
          example: 4215
        output_tokens:
          type: integer
          format: int64
          description: Total output (completion) tokens generated across the request.
          readOnly: true
          example: 318
        tools_used:
          type: object
          additionalProperties: { type: integer }
          description: Map of tool name to the number of times it was invoked during the request.
          readOnly: true
          example: { "weather_lookup": 1, "macos_calendar_events": 2 }
        exhausted:
          type: boolean
          description: Whether the model loop terminated by exhausting its iteration budget rather than completing normally.
          readOnly: true
          example: false
        exhaust_reason:
          type: string
          description: Explanation of why the iteration budget was exhausted, when applicable.
          readOnly: true
          example: "max iterations reached"
        created_at:
          type: string
          format: date-time
          description: Timestamp at which the request was recorded.
          readOnly: true
          example: "2026-06-24T18:57:13Z"
        tool_calls:
          type: array
          items: { $ref: "#/components/schemas/ToolDetail" }
          description: Tool invocations performed while handling the request.
          readOnly: true
      required: [request_id, messages, iteration_count, input_tokens, output_tokens, exhausted, created_at, tool_calls]
    MessageDetail:
      type: object
      description: One retained chat message from the provider-neutral payload sent to the model; image bytes are omitted and only media metadata is retained.
      properties:
        index:
          type: integer
          description: Zero-based position of this message within the request's message sequence.
          readOnly: true
          example: 0
        role:
          type: string
          description: Role of the message author in the conversation.
          readOnly: true
          example: "user"
        content:
          type: string
          description: Text content of the message.
          readOnly: true
          example: "What's the weather like today?"
        content_truncated:
          type: boolean
          description: Whether the retained content was truncated from the original message text.
          readOnly: true
          example: false
        tool_calls:
          type: array
          items: { $ref: "#/components/schemas/MessageToolCallDetail" }
          description: Tool calls embedded in this assistant message.
          readOnly: true
        tool_call_id:
          type: string
          description: Identifier of the tool call this message responds to, for tool-result messages.
          readOnly: true
          example: "call_019e7469"
        images:
          type: array
          items: { $ref: "#/components/schemas/MessageImageDetail" }
          description: Metadata for image attachments on this message, without the image payload.
          readOnly: true
      required: [index, role]
    MessageToolCallDetail:
      type: object
      description: A tool call embedded in an assistant message from the retained chat payload.
      properties:
        id:
          type: string
          description: Identifier of the embedded tool call.
          readOnly: true
          example: "call_019e7469"
        name:
          type: string
          description: Name of the tool requested by the call.
          readOnly: true
          example: "weather_lookup"
        arguments:
          type: string
          description: JSON-encoded arguments passed to the tool call.
          readOnly: true
          example: "{\"location\":\"Austin, TX\"}"
      required: [name]
    MessageImageDetail:
      type: object
      description: Metadata for a retained image attachment, without the base64 image payload.
      properties:
        media_type:
          type: string
          description: MIME media type of the retained image attachment.
          readOnly: true
          example: "image/png"
    ToolDetail:
      type: object
      description: Retained content for a single tool invocation during a request.
      properties:
        tool_call_id:
          type: string
          description: Identifier correlating this invocation with the assistant tool call that requested it.
          readOnly: true
          example: "call_019e7469"
        tool_name:
          type: string
          description: Name of the tool that was invoked.
          readOnly: true
          example: "weather_lookup"
        arguments:
          type: string
          description: JSON-encoded arguments passed to the tool invocation.
          readOnly: true
          example: "{\"location\":\"Austin, TX\"}"
        result:
          type: string
          description: Result returned by the tool invocation.
          readOnly: true
          example: "72F, sunny, wind 5mph"
        iteration_index:
          type: integer
          description: Zero-based model loop iteration in which this tool invocation occurred.
          readOnly: true
          example: 1
      required: [tool_name, iteration_index]
    ScheduledTask:
      type: object
      description: A durable scheduled task plus its next computed fire time.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-assigned UUIDv7 identifier for the task.
          example: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        name:
          type: string
          description: Human-readable label for the task.
          example: Morning briefing
        schedule: { $ref: "#/components/schemas/Schedule" }
        payload: { $ref: "#/components/schemas/SchedulePayload" }
        enabled:
          type: boolean
          description: Whether the task is active and eligible to fire.
          example: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp recording when the task was created.
          example: "2026-06-24T08:15:00Z"
        created_by:
          type: string
          readOnly: true
          description: Session or user ID that created the task.
          example: session-7f3a9c
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp recording when the task was last updated.
          example: "2026-06-24T09:42:00Z"
        next_run:
          type: string
          format: date-time
          readOnly: true
          description: Next computed fire time; omitted when the task has no future run.
          example: "2026-06-25T08:15:00Z"
      required: [id, name, schedule, payload, enabled, created_at, created_by, updated_at]
    Schedule:
      type: object
      description: When a task fires.
      properties:
        kind:
          type: string
          enum: [at, every, cron]
          description: Schedule type selecting which of the timing fields applies.
          example: every
        at:
          type: string
          format: date-time
          description: One-shot fire time for the at kind.
          example: "2026-06-25T08:15:00Z"
        every:
          type: string
          description: Go duration string for the every kind, serialized in canonical form such as 15m0s; shorthand like 15m is accepted on input.
          example: 15m0s
        cron:
          type: string
          description: Cron expression for the cron kind.
          example: "0 8 * * *"
        timezone:
          type: string
          description: IANA timezone name in which the schedule is evaluated.
          example: America/New_York
      required: [kind]
    SchedulePayload:
      type: object
      description: What a task does when it fires.
      properties:
        kind:
          type: string
          enum: [wake, service, automation, webhook]
          description: Action type selecting how the payload is dispatched.
          example: wake
        target:
          type: string
          description: Kind-specific target such as a session ID, entity ID, or webhook reference.
          example: session-7f3a9c
        data:
          type: object
          additionalProperties: true
          description: Kind-specific data passed to the action when it fires.
          example: { message: "Time for your morning briefing" }
      required: [kind]
    ScheduleExecution:
      type: object
      description: One run of a scheduled task.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-assigned UUIDv7 identifier for this execution.
          example: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        task_id:
          type: string
          format: uuid
          readOnly: true
          description: UUIDv7 of the task this execution belongs to.
          example: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        scheduled_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when this run was supposed to fire.
          example: "2026-06-24T08:15:00Z"
        started_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when execution began; omitted before it starts.
          example: "2026-06-24T08:15:01Z"
        completed_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when execution finished; omitted until it completes.
          example: "2026-06-24T08:15:03Z"
        status:
          type: string
          enum: [pending, running, completed, failed, skipped]
          readOnly: true
          description: Current state of the execution.
          example: completed
        result:
          type: string
          readOnly: true
          description: Output or error message produced by the run.
          example: Briefing delivered
      required: [id, task_id, scheduled_at, status]
