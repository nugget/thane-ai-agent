openapi: 3.1.0
info:
  title: Thane Native API
  version: 1.0.0-draft
  summary: First-party management & observability API for Thane's own clients.
  description: |
    The **Thane Native API** is the backend for Thane's own user interfaces —
    the built-in web dashboard today, and a `thane-agent-macos` native app
    next. It is organized **loops-first**: the agent loop is Thane's universal
    execution primitive, so the API leads with `/v1/loops` and hangs everything
    else (requests, conversations, models, telemetry) off that center.

    This is **not** a public or compatibility surface. The OpenAI- and
    Ollama-compatible endpoints that Home Assistant and open-webui consume are
    a separate, frozen product (the *Thane Compatibility API*) served on a
    different host/port. Keeping the two apart lets their security models
    diverge — see below.

    ## Security model (declared now, enforced in stages)

    Each operation below carries an `x-thane-scope` extension naming the
    permission it will require once authorization is enforced. Today the API is
    open behind the network boundary; the contract is declared first so the
    explorer, the UIs, and the eventual middleware all agree on the shape.

    - **AuthN:** bearer token (`Authorization: Bearer <token>`). The scheme is
      written OIDC-ready; tokens are minted directly for now.
    - **AuthZ scopes** are `resource:action`:
      `loops:read`, `definitions:read`, `definitions:write`, `requests:read`,
      `schedules:read`, `conversations:read`, `sessions:read`, `sessions:write`,
      `archive:read`,
      `checkpoints:read`, `checkpoints:write`, `models:read`, `models:admin`,
      `insights:read`, `contacts:read`, `contacts:write`, `system:read`.
    - **Roles** bundle scopes: `observer` (all `:read`), `operator`
      (observer + `definitions:write`, `sessions:write`, `checkpoints:write`),
      `admin` (everything, incl. `models:admin`, `contacts:write`).

    CORS is a per-surface concern: the native API allowlists the UI origins
    (credentialed, cross-origin since the hosts differ); the compatibility API
    has its own, narrower policy.
  contact:
    name: Thane — nugget/thane-ai-agent
    url: https://github.com/nugget/thane-ai-agent
  license:
    name: Apache-2.0
    identifier: Apache-2.0

servers:
  # Relative to the origin that serves /docs, so "Try it" targets the same host
  # the explorer was loaded from: http://localhost:8080 in local dev and the
  # public reverse-proxy host (e.g. https://pocket.hollowoak.net) in production —
  # with no per-deployment edit. OpenAPI 3.1 permits a document-relative server
  # URL, and Scalar resolves "/" against the page origin. The compatibility API
  # lives on its own host/port, so compat.yaml keeps absolute servers.
  - url: /
    description: This Thane instance (same origin as the docs)

security:
  - bearerAuth: []

tags:
  - name: Loops
    description: Active executions — the universal primitive. Start here.
  - name: Loop Definitions
    description: The persisted templates that loops are launched from.
  - name: Requests
    description: A single model turn, with its routing and tool-call facets.
  - name: Conversations & Sessions
    description: Live dialogue transcripts and context-window management.
  - name: Archive
    description: Historical sessions with full-text search and export.
  - name: Checkpoints
    description: Conversation state snapshots for restart survival.
  - name: Scheduler
    description: Durable scheduled tasks and their execution history.
  - name: Model Routing
    description: Available models, plus the registry and routing/resource policies that decide which model runs where.
  - name: Telemetry
    description: Read-only aggregate measurements — routing, tool calls, usage, and capabilities.
  - name: Contacts
    description: Address book (also synced via CardDAV on a separate surface).
  - name: System
    description: Health, version, and process logs.
  - name: Realtime
    description: WebSocket channel for first-party live interaction.

externalDocs:
  description: Source, architecture, and contributor guides on GitHub.
  url: https://github.com/nugget/thane-ai-agent/tree/main/docs

# Sidebar grouping for the Scalar explorer. Every tag above belongs to exactly
# one group; the groups order the /docs navigation by domain. New native
# subsystems (e.g. a future Documents suite) add a tag under "Integrations &
# Data"; "Runtime" stays the host/process surface and doesn't grow with them.
x-tagGroups:
  - name: Execution
    tags: [Loops, Loop Definitions, Requests, Scheduler]
  - name: Memory & History
    tags: [Conversations & Sessions, Archive, Checkpoints]
  - name: Routing & Telemetry
    tags: [Model Routing, Telemetry]
  - name: Integrations & Data
    tags: [Contacts]
  - name: Runtime
    tags: [System, Realtime]

paths:
  # ----------------------------------------------------------------- System
  /health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Liveness probe
      description: Unversioned, unauthenticated liveness check for load balancers.
      security: []
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
  /v1/version:
    get:
      tags: [System]
      operationId: getVersion
      summary: Build and runtime metadata
      x-thane-scope: system:read
      responses:
        "200":
          description: Version info.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionInfo" }
  /v1/system:
    get:
      tags: [System]
      operationId: getSystem
      summary: System health, uptime, and version rollup
      description: Replaces the dashboard-private `/api/system`.
      x-thane-scope: system:read
      responses:
        "200":
          description: System status snapshot.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SystemStatus" }
  /v1/system/logs:
    get:
      tags: [System]
      operationId: getSystemLogs
      summary: Tail the structured process log
      x-thane-scope: system:read
      parameters:
        - $ref: "#/components/parameters/Limit"
        - { name: level, in: query, description: "Minimum log level to include (trace, debug, info, warn, error).", schema: { type: string, enum: [trace, debug, info, warn, error] } }
      responses:
        "200":
          description: Log entries (newest first).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LogEntry" }

  # -------------------------------------------------------------------- Chat
  /v1/chat:
    post:
      tags: [Loops]
      operationId: simpleChat
      summary: Simple synchronous chat (one message in, one reply out)
      description: |
        A minimal first-party chat turn: post a message, get the assistant's
        reply once the agent loop finishes. The richer OpenAI-shaped streaming
        surface lives in the Compatibility API, not here.
      x-thane-scope: sessions:write
      requestBody:
        required: true
        description: The chat message to send (with an optional conversation_id).
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string, example: "Hey Bob, can you check the front door?" }
                conversation_id: { type: string, example: conv-aimee }
              required: [message]
              example:
                message: "Hey Bob, can you check the front door?"
                conversation_id: conv-aimee
      responses:
        "200":
          description: Assistant reply.
          content:
            application/json:
              schema:
                type: object
                properties:
                  response: { type: string, example: "I've checked the front door and it's locked." }
                  model: { type: string, example: thane:latest }
                  conversation_id: { type: string, example: conv-aimee }
                  tool_calls: { type: array, items: { type: string }, example: ["ha_get_state"] }
                example:
                  response: "I've checked the front door and it's locked."
                  model: thane:latest
                  conversation_id: conv-aimee
                  tool_calls: ["ha_get_state"]
        "400": { $ref: "#/components/responses/BadRequest" }

  # ------------------------------------------------------------------ Loops
  /v1/loops:
    get:
      tags: [Loops]
      operationId: listLoops
      summary: List active executions
      description: |
        Every loop the registry currently tracks, across all run shapes —
        autonomous service loops, request/reply, background tasks, and
        event-driven consumers. Replaces the dashboard-private `/api/loops`.
      x-thane-scope: loops:read
      parameters:
        - { name: state, in: query, description: Filter by lifecycle state.,
            schema: { $ref: "#/components/schemas/LoopState" } }
      responses:
        "200":
          description: Loop status snapshots.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LoopStatus" }
  /v1/loops/{id}:
    get:
      tags: [Loops]
      operationId: getLoop
      summary: One execution's detail
      x-thane-scope: loops:read
      parameters:
        - $ref: "#/components/parameters/LoopId"
      responses:
        "200":
          description: Loop status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoopStatus" }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/loops/{id}/logs:
    get:
      tags: [Loops]
      operationId: getLoopLogs
      summary: Log entries scoped to this loop
      description: Replaces `/api/loops/{id}/logs`.
      x-thane-scope: loops:read
      parameters:
        - $ref: "#/components/parameters/LoopId"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Log entries (newest first).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LogEntry" }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/loops/events:
    get:
      tags: [Loops]
      operationId: streamLoopEvents
      summary: Live loop lifecycle stream (SSE)
      description: |
        Server-Sent Events stream of loop lifecycle changes (started, woke,
        slept, errored, stopped). Replaces `/api/loops/events`. The response is
        `text/event-stream`; each event's `data:` is a JSON
        `LoopEvent`. OpenAPI cannot fully model SSE — treat the schema as the
        per-event payload.
      x-thane-scope: loops:read
      responses:
        "200":
          description: An open event stream.
          content:
            text/event-stream:
              schema: { $ref: "#/components/schemas/LoopEvent" }

  # --------------------------------------------------------- Scheduler
  /v1/schedules:
    get:
      tags: [Scheduler]
      operationId: listSchedules
      summary: Scheduled tasks
      description: |
        The durable scheduler's tasks — `at`/`every`/`cron` triggers and their
        payloads — each augmented with its next computed fire time. Surfaces the
        previously internal-only scheduler subsystem.
      x-thane-scope: schedules:read
      parameters:
        - { name: enabled, in: query, description: Return only enabled tasks when true.,
            schema: { type: boolean } }
      responses:
        "200":
          description: Scheduled tasks (newest first).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ScheduledTask" }
  /v1/schedules/{id}:
    get:
      tags: [Scheduler]
      operationId: getSchedule
      summary: One scheduled task
      x-thane-scope: schedules:read
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "200":
          description: Scheduled task.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScheduledTask" }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/schedules/{id}/executions:
    get:
      tags: [Scheduler]
      operationId: getScheduleExecutions
      summary: Execution history for a scheduled task
      x-thane-scope: schedules:read
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Execution records (newest first).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ScheduleExecution" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----------------------------------------------------- Loop Definitions
  /v1/loop-definitions:
    get:
      tags: [Loop Definitions]
      operationId: listLoopDefinitions
      summary: List loop definitions with live runtime state
      description: |
        The single canonical loop-definition surface, replacing the
        dashboard-private `/api/loop-definitions` and the embedded
        `/api/system` field. Each entry pairs the stored definition with its
        eligibility, runtime state, warnings, and post-inheritance effective
        state. Distinct from `/v1/loops` (running instances): this is the
        durable spec registry.
      x-thane-scope: definitions:read
      responses:
        "200":
          description: Definition registry view.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefinitionRegistryView" }
    post:
      tags: [Loop Definitions]
      operationId: createLoopDefinition
      summary: Create or replace a loop definition
      x-thane-scope: definitions:write
      requestBody:
        required: true
        description: The loop definition to create or replace.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoopDefinitionSpec" }
      responses:
        "201":
          description: Definition stored.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefinitionView" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/loop-definitions/{name}:
    get:
      tags: [Loop Definitions]
      operationId: getLoopDefinition
      summary: Fetch one definition
      x-thane-scope: definitions:read
      parameters:
        - $ref: "#/components/parameters/DefinitionName"
      responses:
        "200":
          description: Definition view.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefinitionView" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Loop Definitions]
      operationId: deleteLoopDefinition
      summary: Delete a definition
      x-thane-scope: definitions:write
      parameters:
        - $ref: "#/components/parameters/DefinitionName"
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/loop-definitions/{name}/launch:
    post:
      tags: [Loop Definitions]
      operationId: launchLoopDefinition
      summary: Launch a definition into a running loop
      x-thane-scope: definitions:write
      parameters:
        - $ref: "#/components/parameters/DefinitionName"
      responses:
        "202":
          description: Launch accepted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  loop_id: { type: string, example: 019e7469-3abf-7e6b-ae38-85b5e34915ac }
                  name: { type: string, example: cota_weekend_observer }
                example:
                  loop_id: 019e7469-3abf-7e6b-ae38-85b5e34915ac
                  name: cota_weekend_observer
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/loop-definitions/policy:
    post:
      tags: [Loop Definitions]
      operationId: setLoopDefinitionPolicy
      summary: Set launch policy (e.g. pause a definition)
      x-thane-scope: definitions:write
      requestBody:
        required: true
        description: The launch policy override to apply to the definition.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DefinitionPolicy" }
      responses:
        "200": { description: Policy applied. }
    delete:
      tags: [Loop Definitions]
      operationId: clearLoopDefinitionPolicy
      summary: Clear a launch policy override
      x-thane-scope: definitions:write
      parameters:
        - { name: name, in: query, required: true, description: "Loop definition name whose policy override to clear.", schema: { type: string } }
      responses:
        "204": { description: Cleared. }

  # --------------------------------------------------------------- Requests
  /v1/requests/{id}:
    get:
      tags: [Requests]
      operationId: getRequest
      summary: Detail for a single model turn
      description: Replaces `/api/requests/{id}`.
      x-thane-scope: requests:read
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Request detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequestDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/requests/{id}/routing:
    get:
      tags: [Requests]
      operationId: getRequestRouting
      summary: Why this model was chosen
      description: |
        The router's decision trace for this request. Replaces
        `/v1/router/explain/{requestId}` — routing is a facet of the request,
        not a free-standing subsystem.
      x-thane-scope: requests:read
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Routing explanation.
          content:
            application/json:
              schema:
                type: object
                description: "Router decision trace (schema first-pass; tighten against handler)."
                example:
                  request_id: "019e7469-3abf-7e6b-ae38-85b5e34915ac"
                  selected_model: thane:latest
                  reason: "highest-scoring eligible model for tags [messaging, retrospection]"
                  candidates:
                    - { model: thane:latest, score: 0.92 }
                    - { model: gpt-oss:120b, score: 0.71 }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/requests/{id}/tools:
    get:
      tags: [Requests]
      operationId: getRequestTools
      summary: Tool calls made during this request
      x-thane-scope: requests:read
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Tool-call records.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ToolDetail" }

  # ---------------------------------------------- Conversations & Sessions
  /v1/conversations:
    get:
      tags: [Conversations & Sessions]
      operationId: listConversations
      summary: List, filter, search, and paginate conversation summaries
      description: >
        Returns lightweight conversation summaries (no message content),
        filtered/sorted/keyset-paginated. message_count is the true active
        message count. q matches conversation metadata only (id, contact name,
        address) — for message-content search use /v1/archive/search.
      x-thane-scope: conversations:read
      parameters:
        - { name: ids, in: query, description: "Comma-separated exact conversation ids (max 200).", schema: { type: string } }
        - { name: kind, in: query, description: "Comma-separated id-prefix families, e.g. signal,sched (matches '<kind>-…').", schema: { type: string } }
        - { name: channel, in: query, description: "Filter by channel binding channel (e.g. signal).", schema: { type: string } }
        - { name: contact, in: query, description: "Filter by channel binding contact id.", schema: { type: string } }
        - { name: address, in: query, description: "Filter by channel binding address.", schema: { type: string } }
        - { name: q, in: query, description: "Substring match over id, contact name, and address (metadata only).", schema: { type: string } }
        - { name: updated_after, in: query, description: "RFC3339 timestamp or a duration meaning 'ago' (e.g. 1h, 24h).", schema: { type: string } }
        - { name: updated_before, in: query, description: "RFC3339 timestamp or a duration meaning 'ago' (e.g. 1h, 24h).", schema: { type: string } }
        - { name: created_after, in: query, description: "RFC3339 timestamp or a duration meaning 'ago' (e.g. 1h, 24h).", schema: { type: string } }
        - { name: created_before, in: query, description: "RFC3339 timestamp or a duration meaning 'ago' (e.g. 1h, 24h).", schema: { type: string } }
        - { name: min_messages, in: query, description: "Only conversations with at least this many active messages.", schema: { type: integer, minimum: 0 } }
        - { name: max_messages, in: query, description: "Only conversations with at most this many active messages.", schema: { type: integer, minimum: 0 } }
        - { name: sort, in: query, description: "Field to sort by.", schema: { type: string, enum: [updated_at, created_at, message_count], default: updated_at } }
        - { name: order, in: query, description: "Sort direction.", schema: { type: string, enum: [asc, desc], default: desc } }
        - { name: limit, in: query, description: "Page size.", schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
        - { name: cursor, in: query, description: "Opaque keyset cursor from a prior next_cursor; valid only for the same sort/order.", schema: { type: string } }
      responses:
        "200":
          description: A page of conversation summaries.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConversationPage" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/conversations/{id}:
    get:
      tags: [Conversations & Sessions]
      operationId: getConversation
      summary: Fetch a conversation transcript
      x-thane-scope: conversations:read
      parameters:
        - { name: id, in: path, required: true, description: "Conversation ID.", schema: { type: string } }
      responses:
        "200":
          description: Conversation transcript.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/sessions/stats:
    get:
      tags: [Conversations & Sessions]
      operationId: getSessionStats
      summary: Context / session statistics
      x-thane-scope: sessions:read
      responses:
        "200":
          description: Token-usage, cost, and context-window stats for the active session.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionStats" }
  /v1/sessions/history:
    get:
      tags: [Conversations & Sessions]
      operationId: getSessionHistory
      summary: Session history
      x-thane-scope: sessions:read
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: User and assistant messages from the active conversation, oldest first.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionHistory" }
  /v1/sessions/compact:
    post:
      tags: [Conversations & Sessions]
      operationId: compactSession
      summary: Compact the active context window
      x-thane-scope: sessions:write
      responses:
        "200":
          description: Compaction performed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionActionAck" }
  /v1/sessions/balance:
    post:
      tags: [Conversations & Sessions]
      operationId: balanceSession
      summary: Set the reported account balance
      x-thane-scope: sessions:write
      requestBody:
        required: true
        description: The account balance to record, in USD.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SessionBalanceRequest" }
      responses:
        "200":
          description: Balance recorded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionBalanceAck" }
  /v1/sessions/reset:
    post:
      tags: [Conversations & Sessions]
      operationId: resetSession
      summary: Reset the active session
      x-thane-scope: sessions:write
      responses:
        "200":
          description: Conversation cleared.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionActionAck" }

  # ---------------------------------------------------------------- Archive
  /v1/archive/sessions:
    get:
      tags: [Archive]
      operationId: listArchivedSessions
      summary: List archived sessions
      x-thane-scope: archive:read
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Archived session summaries with the count returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArchivedSessionList" }
  /v1/archive/sessions/{id}:
    get:
      tags: [Archive]
      operationId: getArchivedSession
      summary: Fetch one archived session
      x-thane-scope: archive:read
      parameters:
        - { name: id, in: path, required: true, description: "Archived session ID.", schema: { type: string } }
      responses:
        "200":
          description: The archived session with its full transcript and tool calls.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArchivedSessionDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/archive/sessions/{id}/export:
    get:
      tags: [Archive]
      operationId: exportArchivedSession
      summary: Export an archived session (Markdown or JSON)
      x-thane-scope: archive:read
      parameters:
        - { name: id, in: path, required: true, description: "Archived session ID.", schema: { type: string } }
        - name: format
          in: query
          description: Export format; "markdown" (default) returns a text/markdown document, "json" returns the session and transcript as JSON.
          schema: { type: string, enum: [markdown, md, json], default: markdown }
      responses:
        "200":
          description: Exported document — text/markdown by default, or JSON when format=json.
          content:
            text/markdown:
              schema:
                type: string
                description: The session rendered as a Markdown document.
                example: "# Evening house check-in\n\n**Alice:** Hey, can you check the front door?\n\n**Thane:** I've checked the front door and it's locked.\n"
            application/json:
              schema: { $ref: "#/components/schemas/ArchivedSessionExport" }
  /v1/archive/messages:
    get:
      tags: [Archive]
      operationId: listArchivedMessages
      summary: List archived messages
      x-thane-scope: archive:read
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Archived messages within the requested time range, with the count and echoed bounds.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArchivedMessageList" }
  /v1/archive/search:
    get:
      tags: [Archive]
      operationId: searchArchive
      summary: Full-text search across archived sessions
      x-thane-scope: archive:read
      parameters:
        - { name: q, in: query, required: true, description: FTS5 query string., schema: { type: string } }
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Search hits with surrounding context, plus the count and echoed query.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArchiveSearchResults" }
  /v1/archive/stats:
    get:
      tags: [Archive]
      operationId: getArchiveStats
      summary: Archive size and coverage stats
      x-thane-scope: archive:read
      responses:
        "200":
          description: Archive totals, captured time span, and per-role/status breakdowns.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArchiveStats" }

  # ------------------------------------------------------------ Checkpoints
  /v1/checkpoints:
    get:
      tags: [Checkpoints]
      operationId: listCheckpoints
      summary: List checkpoints
      x-thane-scope: checkpoints:read
      responses:
        "200":
          description: A page of checkpoint metadata (newest first); each entry carries metadata only, with state null.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckpointList" }
    post:
      tags: [Checkpoints]
      operationId: createCheckpoint
      summary: Create a checkpoint
      x-thane-scope: checkpoints:write
      responses:
        "201":
          description: The created checkpoint, with its captured state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkpoint" }
  /v1/checkpoints/{id}:
    get:
      tags: [Checkpoints]
      operationId: getCheckpoint
      summary: Fetch a checkpoint
      x-thane-scope: checkpoints:read
      parameters: [ { name: id, in: path, required: true, description: "Checkpoint ID.", schema: { type: string, format: uuid } } ]
      responses:
        "200":
          description: The requested checkpoint, with its captured state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkpoint" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Checkpoints]
      operationId: deleteCheckpoint
      summary: Delete a checkpoint
      x-thane-scope: checkpoints:write
      parameters: [ { name: id, in: path, required: true, description: "Checkpoint ID.", schema: { type: string, format: uuid } } ]
      responses:
        "204": { description: Deleted; no response body. }
  /v1/checkpoints/{id}/restore:
    post:
      tags: [Checkpoints]
      operationId: restoreCheckpoint
      summary: Restore from a checkpoint
      x-thane-scope: checkpoints:write
      parameters: [ { name: id, in: path, required: true, description: "Checkpoint ID.", schema: { type: string, format: uuid } } ]
      responses:
        "200":
          description: Acknowledgement that the checkpoint was restored.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckpointRestoreAck" }
        "404": { $ref: "#/components/responses/NotFound" }

  # --------------------------------------------------------- Model Routing
  /v1/models:
    get:
      tags: [Model Routing]
      operationId: listModels
      summary: Available models (native fleet view)
      description: |
        The native, richer fleet view (resources, capabilities, health) for
        the UIs. NOT the OpenAI-shaped model list — that lives in the
        Compatibility API.
      x-thane-scope: models:read
      responses:
        "200":
          description: Models.
          content:
            application/json:
              schema:
                type: array
                items: { type: object }
                example:
                  - { name: thane:latest, context_window: 200000, capabilities: [messaging, retrospection, vision], healthy: true, resource: spark }
                  - { name: gpt-oss:120b, context_window: 131072, capabilities: [messaging], healthy: true, resource: spark }
  /v1/models/registry:
    get:
      tags: [Model Routing]
      operationId: getModelRegistry
      summary: Model-registry snapshot
      x-thane-scope: models:read
      responses:
        "200":
          description: Registry snapshot.
          content:
            application/json:
              schema:
                type: object
                example:
                  generation: 42
                  updated_at: "2026-06-24T18:57:13Z"
                  models:
                    - { name: thane:latest, resource: spark, weight: 1.0 }
                    - { name: gpt-oss:120b, resource: spark, weight: 0.5 }
                  resources:
                    - { name: spark, host: "spark.hollowoak.net", available: true }
  /v1/models/registry/policy:
    put:
      tags: [Model Routing]
      operationId: setModelPolicy
      summary: Set a model routing policy
      x-thane-scope: models:admin
      requestBody:
        required: true
        description: "The model routing policy to apply."
        content:
          application/json:
            schema:
              type: object
              example:
                model: thane:latest
                weight: 1.0
                pinned: true
                tags: [messaging, retrospection]
      responses: { "200": { description: Applied. } }
    delete:
      tags: [Model Routing]
      operationId: clearModelPolicy
      summary: Clear a model routing policy
      x-thane-scope: models:admin
      responses: { "204": { description: Cleared. } }
  /v1/models/registry/resource-policy:
    put:
      tags: [Model Routing]
      operationId: setResourcePolicy
      summary: Set a resource (host) policy
      x-thane-scope: models:admin
      requestBody:
        required: true
        description: "The resource (host) policy to apply."
        content:
          application/json:
            schema:
              type: object
              example:
                resource: spark
                host: "spark.hollowoak.net"
                enabled: true
                max_concurrent: 4
      responses: { "200": { description: Applied. } }
    delete:
      tags: [Model Routing]
      operationId: clearResourcePolicy
      summary: Clear a resource policy
      x-thane-scope: models:admin
      responses: { "204": { description: Cleared. } }

  # ------------------------------------------------------------ Telemetry
  /v1/insights/router:
    get:
      tags: [Telemetry]
      operationId: getRouterInsights
      summary: Router stats and recent audit
      description: Consolidates `/v1/router/stats` and `/v1/router/audit`.
      x-thane-scope: insights:read
      responses:
        "200":
          description: Router insights.
          content:
            application/json:
              schema:
                type: object
                example:
                  stats:
                    total_decisions: 14082
                    by_model: { "thane:latest": 9871, "gpt-oss:120b": 4211 }
                  recent:
                    - { request_id: "019e7469-3abf-7e6b-ae38-85b5e34915ac", selected_model: thane:latest, ts: "2026-06-24T14:31:07Z" }
  /v1/insights/tools:
    get:
      tags: [Telemetry]
      operationId: getToolInsights
      summary: Tool-call stats and recent calls
      description: Consolidates `/v1/tools/stats` and `/v1/tools/calls`.
      x-thane-scope: insights:read
      responses:
        "200":
          description: Tool insights.
          content:
            application/json:
              schema:
                type: object
                example:
                  stats:
                    total_calls: 8421
                    by_tool: { ha_get_state: 3120, send_message: 2841, log_search: 1204 }
                  recent:
                    - { tool_name: ha_get_state, request_id: "019e7469-3abf-7e6b-ae38-85b5e34915ac", ts: "2026-06-24T14:31:09Z" }
  /v1/insights/usage:
    get:
      tags: [Telemetry]
      operationId: getUsageInsights
      summary: Token / cost usage summary
      description: Was `/v1/usage/summary`.
      x-thane-scope: insights:read
      parameters:
        - { name: hours, in: query, description: "Lookback window in hours (default 24).", schema: { type: integer, minimum: 1, default: 24 } }
        - { name: group_by, in: query, description: "Break the summary down by a dimension (e.g. model); omit for an ungrouped total.", schema: { type: string } }
      responses:
        "200":
          description: "Usage summary (grouped when group_by is set)."
          content:
            application/json:
              schema:
                type: object
                example:
                  window_hours: 24
                  input_tokens: 1284532
                  output_tokens: 318204
                  estimated_cost_usd: 12.47
                  by_model:
                    "thane:latest": { input_tokens: 982140, output_tokens: 241003 }
                    "gpt-oss:120b": { input_tokens: 302392, output_tokens: 77201 }
  /v1/insights/capabilities:
    get:
      tags: [Telemetry]
      operationId: listCapabilities
      summary: Resolved capability-tag catalog
      description: Was the dashboard-private `/api/capabilities`.
      x-thane-scope: insights:read
      responses:
        "200":
          description: Capability catalog.
          content:
            application/json:
              schema:
                type: object
                example:
                  tags:
                    - { tag: messaging, models: ["thane:latest", "gpt-oss:120b"], tools: [send_message] }
                    - { tag: vision, models: ["thane:latest"], tools: [image_describe] }
                  count: 2
  /v1/insights/capabilities/{tag}:
    get:
      tags: [Telemetry]
      operationId: getCapability
      summary: One capability tag's resolved view
      x-thane-scope: insights:read
      parameters: [ { name: tag, in: path, required: true, description: "Capability tag.", schema: { type: string } } ]
      responses:
        "200":
          description: Capability entry.
          content:
            application/json:
              schema:
                type: object
                example:
                  tag: messaging
                  models: ["thane:latest", "gpt-oss:120b"]
                  tools: [send_message]
                  active: true
        "404": { $ref: "#/components/responses/NotFound" }

  # -------------------------------------------------------------- Contacts
  /v1/contacts:
    get:
      tags: [Contacts]
      operationId: listContacts
      summary: List contacts
      x-thane-scope: contacts:read
      responses:
        "200":
          description: Contacts.
          content:
            application/json:
              schema:
                type: array
                items: { type: object }
                example:
                  - { id: 019e7469-3abf-7e6b-ae38-85b5e34915ac, name: Alice, email: alice@example.com, phone: "+15551234567" }
                  - { id: 019e7468-1c2d-7a90-b3ef-2f0a9c4d5e6f, name: Bob, email: bob@example.com, phone: "+15557654321" }
    post:
      tags: [Contacts]
      operationId: createContact
      summary: Create a contact
      x-thane-scope: contacts:write
      requestBody:
        required: true
        description: "The contact to create."
        content:
          application/json:
            schema:
              type: object
              example:
                name: Alice
                email: alice@example.com
                phone: "+15551234567"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 019e7469-3abf-7e6b-ae38-85b5e34915ac
                  name: Alice
                  email: alice@example.com
                  phone: "+15551234567"
  /v1/contacts/{id}:
    get:
      tags: [Contacts]
      operationId: getContact
      summary: Fetch a contact
      x-thane-scope: contacts:read
      parameters: [ { name: id, in: path, required: true, description: "Contact ID.", schema: { type: string, format: uuid } } ]
      responses:
        "200":
          description: Contact.
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 019e7469-3abf-7e6b-ae38-85b5e34915ac
                  name: Alice
                  email: alice@example.com
                  phone: "+15551234567"
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Contacts]
      operationId: updateContact
      summary: Update a contact
      x-thane-scope: contacts:write
      parameters: [ { name: id, in: path, required: true, description: "Contact ID.", schema: { type: string, format: uuid } } ]
      requestBody:
        required: true
        description: "The updated contact fields."
        content:
          application/json:
            schema:
              type: object
              example:
                name: Alice
                email: alice@example.com
                phone: "+15559998888"
      responses:
        "200": { description: Updated. }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Contacts]
      operationId: deleteContact
      summary: Delete a contact
      x-thane-scope: contacts:write
      parameters: [ { name: id, in: path, required: true, description: "Contact ID.", schema: { type: string, format: uuid } } ]
      responses:
        "204": { description: Deleted. }

  # -------------------------------------------------------------- Realtime
  /v1/realtime/ws:
    get:
      tags: [Realtime]
      operationId: realtimeWebSocket
      summary: First-party realtime channel (WebSocket upgrade)
      description: |
        WebSocket endpoint for live interaction from first-party clients (the
        web UI and the macOS app). Unifies the pre-reshape `/v1/companion/ws`
        and `/v1/platform/ws`, which shared one handler. This is a protocol
        upgrade, not a JSON response — OpenAPI documents it for discovery only.
      x-thane-scope: loops:read
      responses:
        "101": { description: Switching Protocols (WebSocket). }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer token. Written OIDC-ready; minted directly for now. The
        per-operation `x-thane-scope` extension names the scope the token must
        carry once authorization is enforced.

  parameters:
    LoopId:
      name: id
      in: path
      required: true
      description: Loop ID (e.g. `019e7469-3abf-7e6b-ae38-85b5e34915ac`).
      schema: { type: string }
    DefinitionName:
      name: name
      in: path
      required: true
      description: Loop definition name (e.g. `cota_weekend_observer`).
      schema: { type: string }
    RequestId:
      name: id
      in: path
      required: true
      description: Request ID (e.g. `r_84dc5155c60d97be`).
      schema: { type: string }
    ScheduleId:
      name: id
      in: path
      required: true
      description: Scheduled task ID (UUIDv7).
      schema: { type: string }
    Limit:
      name: limit
      in: query
      description: Maximum number of items to return.
      schema: { type: integer, minimum: 1, default: 50 }
    Offset:
      name: offset
      in: query
      description: Number of items to skip.
      schema: { type: integer, minimum: 0, default: 0 }

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      description: Standard error envelope returned for any 4xx/5xx response.
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable message describing what went wrong.
          example: resource not found

    VersionInfo:
      type: object
      additionalProperties: { type: string }
      description: >-
        Build and runtime metadata as flat string key/value pairs (version,
        commit, branch, go_version, build_time, ...). Keys are open, not fixed.
      example:
        version: v0.9.2-596-gf92a9208
        git_commit: f92a9208
        git_branch: main
        go_version: go1.26.1
        uptime: 133h30m0s

    LogEntry:
      type: object
      description: One structured log row from the process log index, as returned by the system and per-loop log endpoints.
      required: [id, ts, level, msg]
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          description: Monotonic row identifier in the log index.
          example: 184213
        ts:
          type: string
          format: date-time
          readOnly: true
          description: Time the log record was emitted.
          example: "2026-06-24T14:31:07Z"
        level:
          type: string
          readOnly: true
          description: Severity level.
          enum: [TRACE, DEBUG, INFO, WARN, ERROR]
          example: INFO
        msg:
          type: string
          readOnly: true
          description: The log message.
          example: loop iteration complete
        request_id:
          type: string
          readOnly: true
          description: Request this record is associated with, when emitted during a model turn.
          example: "019e7469-3abf-7e6b-ae38-85b5e34915ac"
        session_id:
          type: string
          readOnly: true
          description: Session this record belongs to, when applicable.
        conversation_id:
          type: string
          readOnly: true
          description: Conversation this record belongs to, when applicable.
          example: conv-aimee
        subsystem:
          type: string
          readOnly: true
          description: Originating subsystem / component tag.
          example: scheduler
        tool:
          type: string
          readOnly: true
          description: Tool name, for tool-call log records.
          example: ha_get_state
        model:
          type: string
          readOnly: true
          description: Model name, for model-turn log records.
          example: claude-opus-4-8
        loop_id:
          type: string
          readOnly: true
          description: Loop that emitted the record, when applicable.
        loop_name:
          type: string
          readOnly: true
          description: Human label of the emitting loop.
          example: signal/aimee
        attrs:
          type: string
          readOnly: true
          description: Additional structured attributes, as a JSON-encoded string.
          example: '{"input_tokens":9123,"output_tokens":2048}'
        source_file:
          type: string
          readOnly: true
          description: Source file that emitted the log record.
          example: internal/runtime/loop/loop.go
        source_line:
          type: integer
          readOnly: true
          description: Line number within source_file.
          example: 412
      example:
        id: 184213
        ts: "2026-06-24T14:31:07Z"
        level: INFO
        msg: loop iteration complete
        request_id: "019e7469-3abf-7e6b-ae38-85b5e34915ac"
        conversation_id: conv-aimee
        subsystem: scheduler
        tool: ha_get_state
        model: claude-opus-4-8
        loop_name: signal/aimee
        attrs: '{"input_tokens":9123,"output_tokens":2048}'
        source_file: internal/runtime/loop/loop.go
        source_line: 412

    SystemStatus:
      type: object
      description: Aggregate system view — uptime, build version, and per-service health — backing the dashboard's system panel.
      properties:
        uptime_seconds:
          type: integer
          format: int64
          readOnly: true
          description: Seconds since the process started.
          example: 480600
        version:
          $ref: "#/components/schemas/VersionInfo"
        health:
          type: object
          readOnly: true
          description: Per-service readiness, keyed by service name.
          additionalProperties: { $ref: "#/components/schemas/ServiceHealth" }
          example:
            home_assistant: { name: Home Assistant, ready: true, last_check: "2026-06-24T14:30:55Z" }
            signal: { name: Signal, ready: true, last_check: "2026-06-24T14:30:55Z" }
      additionalProperties: true
      example:
        uptime_seconds: 480600
        version:
          version: v0.9.2-596-gf92a9208
          git_commit: f92a9208
          git_branch: main
          go_version: go1.26.1
          uptime: 133h30m0s
        health:
          home_assistant: { name: Home Assistant, ready: true, last_check: "2026-06-24T14:30:55Z" }
          signal: { name: Signal, ready: true, last_check: "2026-06-24T14:30:55Z" }

    ServiceHealth:
      type: object
      description: Readiness snapshot for one wired service (Home Assistant, MQTT, Signal, ...).
      required: [name, ready]
      properties:
        name:
          type: string
          readOnly: true
          description: Human-readable service display name (the service identifier is the key in the surrounding health map).
          example: Home Assistant
        ready:
          type: boolean
          readOnly: true
          description: Whether the service is currently reachable and healthy.
          example: true
        last_check:
          type: string
          format: date-time
          readOnly: true
          description: Time of the most recent health probe.
          example: "2026-06-24T14:30:55Z"
        last_error:
          type: string
          readOnly: true
          description: Error from the most recent failed probe, if any.

    LoopState:
      type: string
      enum: [pending, sleeping, waiting, processing, error, stopped]
      readOnly: true
      description: >-
        Lifecycle state of a loop: pending (registered but not yet started),
        sleeping (between iterations awaiting the next wake), waiting (blocked
        on a WaitFunc for an external event), processing (actively running an
        iteration), error (last iteration failed and will retry), or stopped
        (cancelled and no longer running).
      example: processing
    LoopStatus:
      type: object
      description: Snapshot of a loop's current lifecycle state and cumulative metrics, suitable for external inspection via the registry.
      properties:
        id:
          type: string
          description: Unique identifier of the loop.
          readOnly: true
          example: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        name:
          type: string
          description: Human-readable name of the loop.
          readOnly: true
          example: signal-interactive
        state: { $ref: "#/components/schemas/LoopState" }
        parent_id:
          type: string
          description: Identifier of the parent loop, when this loop was spawned as a delegate.
          readOnly: true
          example: 019e7468-1c2d-7a90-b3ef-2f0a9c4d5e6f
        started_at:
          type: string
          format: date-time
          description: Time the loop was started.
          readOnly: true
          example: "2026-06-24T14:03:21Z"
        last_wake_at:
          type: string
          format: date-time
          description: Time the loop last began an iteration.
          readOnly: true
          example: "2026-06-24T14:31:07Z"
        iterations:
          type: integer
          description: Total number of completed (successful) iterations.
          readOnly: true
          example: 142
        attempts:
          type: integer
          description: Total number of iteration attempts, including failures.
          readOnly: true
          example: 145
        total_input_tokens:
          type: integer
          format: int64
          description: Cumulative input tokens consumed across all iterations.
          readOnly: true
          example: 1284532
        total_output_tokens:
          type: integer
          format: int64
          description: Cumulative output tokens produced across all iterations.
          readOnly: true
          example: 318204
        last_input_tokens:
          type: integer
          description: Input token count from the most recent iteration.
          readOnly: true
          example: 9123
        last_output_tokens:
          type: integer
          description: Output token count from the most recent iteration.
          readOnly: true
          example: 2048
        context_window:
          type: integer
          description: Maximum context size, in tokens, of the model used.
          readOnly: true
          example: 200000
        last_error:
          type: string
          description: Error message from the most recent failed iteration.
          readOnly: true
          example: "model request timed out"
        consecutive_errors:
          type: integer
          description: Number of consecutive failed iterations.
          readOnly: true
          example: 0
        recent_conv_ids:
          type: array
          items: { type: string }
          description: Conversation IDs from the most recent iterations (up to 10, newest first), used to scope log queries to this loop.
          readOnly: true
          example: ["019e7469-3abf-7e6b-ae38-85b5e34915ac", "019e7469-1a2b-7c3d-9e4f-0a1b2c3d4e5f"]
        handler_only:
          type: boolean
          description: True when the loop runs a Handler instead of LLM iterations and therefore reports no token metrics.
          readOnly: true
          example: false
        event_driven:
          type: boolean
          description: True when the loop is event-driven (blocks on notification arrivals) rather than timer-based.
          readOnly: true
          example: false
        recent_iterations:
          type: array
          items: { $ref: "#/components/schemas/IterationSnapshot" }
          description: Up to 10 completed iteration snapshots (newest first), used by the dashboard timeline.
          readOnly: true
      required: [id, name, state, started_at, iterations, attempts, total_input_tokens, total_output_tokens, consecutive_errors]
      example:
        id: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        name: signal-interactive
        state: processing
        parent_id: 019e7468-1c2d-7a90-b3ef-2f0a9c4d5e6f
        started_at: "2026-06-24T14:03:21Z"
        last_wake_at: "2026-06-24T14:31:07Z"
        iterations: 142
        attempts: 145
        total_input_tokens: 1284532
        total_output_tokens: 318204
        last_input_tokens: 9123
        last_output_tokens: 2048
        context_window: 200000
        consecutive_errors: 0
        recent_conv_ids: ["019e7469-3abf-7e6b-ae38-85b5e34915ac", "019e7469-1a2b-7c3d-9e4f-0a1b2c3d4e5f"]
        handler_only: false
        event_driven: false
    IterationSnapshot:
      type: object
      description: Serializable summary of a single completed loop iteration, retained in a ring buffer for the dashboard timeline.
      properties:
        number:
          type: integer
          description: 1-based iteration number, matching the loop's cumulative iteration counter at the time of completion.
          readOnly: true
          example: 142
        conv_id:
          type: string
          description: Conversation ID used for this iteration.
          readOnly: true
          example: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        request_id:
          type: string
          description: Agent-generated request ID linking to log_request_content for prompt/response inspection.
          readOnly: true
          example: 019e7469-7b8c-7d9e-af01-23456789abcd
        model:
          type: string
          description: LLM model used for this iteration.
          readOnly: true
          example: claude-opus-4-8
        input_tokens:
          type: integer
          description: Input tokens consumed by this iteration.
          readOnly: true
          example: 9123
        output_tokens:
          type: integer
          description: Output tokens produced by this iteration.
          readOnly: true
          example: 2048
        context_window:
          type: integer
          description: Model's maximum context size, in tokens.
          readOnly: true
          example: 200000
        tools_used:
          type: object
          additionalProperties: { type: integer }
          description: Map of tool names to the number of times each was invoked during this iteration.
          readOnly: true
          example: { "log_search": 2, "send_message": 1 }
        effective_tools:
          type: array
          items: { type: string }
          description: Tools visible to the model for this turn.
          readOnly: true
          example: ["log_search", "send_message", "loop_status"]
        active_tags:
          type: array
          items: { type: string }
          description: Capability tags active for this turn.
          readOnly: true
          example: ["messaging", "retrospection"]
        tooling:
          type: object
          additionalProperties: true
          description: Tool-availability snapshot for the turn (which tools were exposed, and why).
          readOnly: true
        elapsed_ms:
          type: integer
          format: int64
          description: Wall-clock duration of the iteration, in milliseconds.
          readOnly: true
          example: 4213
        supervisor:
          type: boolean
          description: True when this iteration ran a supervisor turn.
          readOnly: true
          example: false
        supervisor_trigger:
          type: string
          description: >-
            Cause of the supervisor turn — empty for a normal turn, "random"
            for a Bernoulli win, or "forced" for a notification-driven turn.
          readOnly: true
          example: random
        error:
          type: string
          description: Error message if the iteration failed.
          readOnly: true
          example: "model request timed out"
        started_at:
          type: string
          format: date-time
          description: Time the iteration began.
          readOnly: true
          example: "2026-06-24T14:31:07Z"
        completed_at:
          type: string
          format: date-time
          description: Time the iteration finished.
          readOnly: true
          example: "2026-06-24T14:31:11Z"
        sleep_after_ms:
          type: integer
          format: int64
          description: Computed sleep duration following this iteration, in milliseconds; zero for WaitFunc-based loops.
          readOnly: true
          example: 30000
        wait_after:
          type: boolean
          description: True when the loop entered WaitFunc after this iteration instead of sleeping.
          readOnly: true
          example: false
        summary:
          type: object
          additionalProperties: true
          description: Handler-reported metrics for this iteration, written by handlers during execution as small scalar values.
          readOnly: true
          example: { "messages_processed": 3 }
      required: [number, elapsed_ms, started_at, completed_at]
    LoopEvent:
      type: object
      description: >-
        A single loop lifecycle event streamed over the /v1/loops/events SSE
        channel (the loopEvent wire envelope). The SSE `event:` line carries
        the source ("loop" or "delegate"); this object is the `data:` payload.
      properties:
        kind:
          type: string
          description: >-
            Event kind identifying the lifecycle transition (e.g. loop_started,
            loop_iteration_start, loop_iteration_complete, loop_sleep_start,
            loop_wait_start, loop_state_change, loop_error, loop_tool_start,
            loop_tool_done, loop_llm_start, loop_llm_response).
          readOnly: true
          example: loop_iteration_complete
        ts:
          type: string
          format: date-time
          description: Time the event occurred.
          readOnly: true
          example: "2026-06-24T14:31:11Z"
        data:
          type: object
          additionalProperties: true
          description: >-
            Kind-specific key/value payload. The loop always injects loop_id
            and loop_name; remaining keys depend on the event kind (e.g.
            model, input_tokens, output_tokens, elapsed_ms, tools_used for
            loop_iteration_complete; from, to for loop_state_change; error for
            loop_error). Omitted when there are no event fields.
          readOnly: true
          example: { "loop_id": "019e7469-3abf-7e6b-ae38-85b5e34915ac", "loop_name": "signal-interactive", "model": "claude-opus-4-8", "input_tokens": 9123, "output_tokens": 2048, "elapsed_ms": 4213 }
      required: [kind, ts]
    DefinitionRegistryView:
      type: object
      description: Effective combined view of stored loop definitions plus their current live runtime state.
      properties:
        generation:
          type: integer
          format: int64
          description: Monotonic registry generation counter, bumped each time the effective definition set changes.
          readOnly: true
          example: 42
        updated_at:
          type: string
          format: date-time
          description: Timestamp at which the underlying definition registry snapshot was last updated.
          readOnly: true
          example: "2026-06-24T18:57:13Z"
        config_definitions:
          type: integer
          description: Number of definitions sourced from immutable config-file input.
          readOnly: true
          example: 7
        overlay_definitions:
          type: integer
          description: Number of definitions sourced from the mutable persistent overlay.
          readOnly: true
          example: 3
        running_definitions:
          type: integer
          description: Number of definitions that currently have a live backing loop instance running.
          readOnly: true
          example: 2
        definitions_with_warnings:
          type: integer
          description: Number of definitions that produced at least one warning during view construction.
          readOnly: true
          example: 1
        warning_count:
          type: integer
          description: Total number of warnings across all definitions in the view.
          readOnly: true
          example: 3
        by_policy_state:
          type: object
          additionalProperties: { type: integer }
          description: Count of definitions grouped by their effective policy state (active, paused, inactive).
          readOnly: true
          example: { active: 8, inactive: 2 }
        by_eligibility_state:
          type: object
          additionalProperties: { type: integer }
          description: Count of definitions grouped by their effective eligibility state (eligible, ineligible).
          readOnly: true
          example: { eligible: 9, ineligible: 1 }
        by_runtime_state:
          type: object
          additionalProperties: { type: integer }
          description: Count of definitions grouped by their current runtime lifecycle state (e.g. running, not_running).
          readOnly: true
          example: { running: 2, not_running: 8 }
        definitions:
          type: array
          description: Per-definition combined stored-and-runtime views.
          items: { $ref: "#/components/schemas/DefinitionView" }
          example:
            - eligibility: { eligible: true }
              runtime: { running: true, state: processing, iterations: 142 }
              warnings: []
              effective: { tags: [messaging, retrospection] }
      example:
        generation: 42
        updated_at: "2026-06-24T18:57:13Z"
        config_definitions: 7
        overlay_definitions: 3
        running_definitions: 2
        definitions_with_warnings: 1
        warning_count: 3
        by_policy_state: { active: 8, inactive: 2 }
        by_eligibility_state: { eligible: 9, ineligible: 1 }
        by_runtime_state: { running: 2, not_running: 8 }
        definitions:
          - eligibility: { eligible: true }
            runtime: { running: true, state: processing, iterations: 142 }
            warnings: []
            effective: { tags: [messaging, retrospection] }
    DefinitionView:
      type: object
      description: One stored definition combined with its eligibility, live runtime status, warnings, and effective post-merge state.
      properties:
        eligibility:
          type: object
          additionalProperties: true
          description: Effective eligibility evaluation for this definition, including whether it may run and why.
          readOnly: true
          example: { eligible: true, reason: "all subscriptions satisfied" }
        runtime:
          type: object
          additionalProperties: true
          description: Live runtime status of the backing loop instance for this definition (running flag, state, counters, last error).
          readOnly: true
        warnings:
          type: array
          items: { type: object }
          description: Warnings produced while validating or rendering this definition's spec.
          readOnly: true
        effective:
          type: object
          additionalProperties: true
          description: Post-ancestor-merge state for inheritable fields (tags, subscriptions, exclude_tools, routing factors, delegation gating); absent when there is nothing meaningful to report.
          readOnly: true
      additionalProperties: true
      example:
        name: cota_weekend_observer
        operation: service
        eligibility: { eligible: true, reason: "all subscriptions satisfied" }
        runtime: { running: true, state: processing, iterations: 142 }
        warnings: []
        effective: { tags: [messaging, retrospection] }
    LoopDefinitionSpec:
      type: object
      description: Persistable loop definition payload (name, operation, sleep envelope, subscriptions, tags, profile, ...). First-pass permissive schema; tighten against loop.Spec / loop.DefinitionSnapshot.
      properties:
        name:
          type: string
          description: Unique identifier of the loop definition.
          example: research_assistant
        operation:
          type: string
          enum: [request_reply, background_task, service, container, event_driven]
          description: Runtime operation pattern the loop follows.
          example: service
      required: [name]
      additionalProperties: true
    DefinitionPolicy:
      type: object
      description: Set-policy request body for one loop definition (target name, desired state, optional reason). Wraps loop.DefinitionPolicy plus the target name.
      properties:
        name:
          type: string
          description: Name of the loop definition this policy overlay targets.
          example: research_assistant
        state:
          type: string
          enum: [active, paused, inactive]
          description: Desired effective runtime state for the definition.
          example: paused
      required: [name, state]
    RequestDetail:
      type: object
      description: Full retained content for a single model request, ready for JSON serialization by the web API.
      properties:
        request_id:
          type: string
          description: Opaque identifier of the request this detail belongs to (a UUIDv7 in the common path; not guaranteed to be a UUID).
          readOnly: true
          example: "019e7469-3abf-7e6b-ae38-85b5e34915ac"
        prompt_hash:
          type: string
          description: Hash of the resolved prompt for this request, used to detect identical prompts.
          readOnly: true
          example: "sha256:9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08"
        system_prompt:
          type: string
          description: System prompt text supplied to the model for this request.
          readOnly: true
          example: "You are Thane, a helpful home assistant."
        messages:
          type: array
          items: { $ref: "#/components/schemas/MessageDetail" }
          description: Provider-neutral chat messages sent to the model for this request.
          readOnly: true
          example:
            - { index: 0, role: user, content: "What's the weather like today?", content_truncated: false }
            - { index: 1, role: assistant, content: "It's currently 72 degrees and sunny.", content_truncated: false }
        user_content:
          type: string
          description: Flattened user-authored content extracted from the request.
          readOnly: true
          example: "What's the weather like today?"
        assistant_content:
          type: string
          description: Flattened assistant-authored content produced for this request.
          readOnly: true
          example: "It's currently 72 degrees and sunny."
        model:
          type: string
          description: Identifier of the model that served the request.
          readOnly: true
          example: "claude-opus-4-8"
        iteration_count:
          type: integer
          format: int64
          description: Number of model loop iterations executed while handling the request.
          readOnly: true
          example: 3
        input_tokens:
          type: integer
          format: int64
          description: Total input (prompt) tokens consumed across the request.
          readOnly: true
          example: 4215
        output_tokens:
          type: integer
          format: int64
          description: Total output (completion) tokens generated across the request.
          readOnly: true
          example: 318
        tools_used:
          type: object
          additionalProperties: { type: integer }
          description: Map of tool name to the number of times it was invoked during the request.
          readOnly: true
          example: { "weather_lookup": 1, "macos_calendar_events": 2 }
        exhausted:
          type: boolean
          description: Whether the model loop terminated by exhausting its iteration budget rather than completing normally.
          readOnly: true
          example: false
        exhaust_reason:
          type: string
          description: Explanation of why the iteration budget was exhausted, when applicable.
          readOnly: true
          example: "max iterations reached"
        created_at:
          type: string
          format: date-time
          description: Timestamp at which the request was recorded.
          readOnly: true
          example: "2026-06-24T18:57:13Z"
        tool_calls:
          type: array
          items: { $ref: "#/components/schemas/ToolDetail" }
          description: Tool invocations performed while handling the request.
          readOnly: true
      required: [request_id, messages, iteration_count, input_tokens, output_tokens, exhausted, created_at, tool_calls]
      example:
        request_id: "019e7469-3abf-7e6b-ae38-85b5e34915ac"
        prompt_hash: "sha256:9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08"
        system_prompt: "You are Thane, a helpful home assistant."
        messages:
          - { index: 0, role: user, content: "What's the weather like today?", content_truncated: false }
          - { index: 1, role: assistant, content: "It's currently 72 degrees and sunny.", content_truncated: false }
        user_content: "What's the weather like today?"
        assistant_content: "It's currently 72 degrees and sunny."
        model: "claude-opus-4-8"
        iteration_count: 3
        input_tokens: 4215
        output_tokens: 318
        tools_used: { "weather_lookup": 1, "macos_calendar_events": 2 }
        exhausted: false
        created_at: "2026-06-24T18:57:13Z"
        tool_calls:
          - { tool_call_id: "call_019e7469", tool_name: "weather_lookup", arguments: "{\"location\":\"Austin, TX\"}", result: "72F, sunny, wind 5mph", iteration_index: 1 }
    MessageDetail:
      type: object
      description: One retained chat message from the provider-neutral payload sent to the model; image bytes are omitted and only media metadata is retained.
      properties:
        index:
          type: integer
          description: Zero-based position of this message within the request's message sequence.
          readOnly: true
          example: 0
        role:
          type: string
          description: Role of the message author in the conversation.
          readOnly: true
          example: "user"
        content:
          type: string
          description: Text content of the message.
          readOnly: true
          example: "What's the weather like today?"
        content_truncated:
          type: boolean
          description: Whether the retained content was truncated from the original message text.
          readOnly: true
          example: false
        tool_calls:
          type: array
          items: { $ref: "#/components/schemas/MessageToolCallDetail" }
          description: Tool calls embedded in this assistant message.
          readOnly: true
        tool_call_id:
          type: string
          description: Identifier of the tool call this message responds to, for tool-result messages.
          readOnly: true
          example: "call_019e7469"
        images:
          type: array
          items: { $ref: "#/components/schemas/MessageImageDetail" }
          description: Metadata for image attachments on this message, without the image payload.
          readOnly: true
      required: [index, role]
    MessageToolCallDetail:
      type: object
      description: A tool call embedded in an assistant message from the retained chat payload.
      properties:
        id:
          type: string
          description: Identifier of the embedded tool call.
          readOnly: true
          example: "call_019e7469"
        name:
          type: string
          description: Name of the tool requested by the call.
          readOnly: true
          example: "weather_lookup"
        arguments:
          type: string
          description: JSON-encoded arguments passed to the tool call.
          readOnly: true
          example: "{\"location\":\"Austin, TX\"}"
      required: [name]
    MessageImageDetail:
      type: object
      description: Metadata for a retained image attachment, without the base64 image payload.
      properties:
        media_type:
          type: string
          description: MIME media type of the retained image attachment.
          readOnly: true
          example: "image/png"
    ToolDetail:
      type: object
      description: Retained content for a single tool invocation during a request.
      properties:
        tool_call_id:
          type: string
          description: Identifier correlating this invocation with the assistant tool call that requested it.
          readOnly: true
          example: "call_019e7469"
        tool_name:
          type: string
          description: Name of the tool that was invoked.
          readOnly: true
          example: "weather_lookup"
        arguments:
          type: string
          description: JSON-encoded arguments passed to the tool invocation.
          readOnly: true
          example: "{\"location\":\"Austin, TX\"}"
        result:
          type: string
          description: Result returned by the tool invocation.
          readOnly: true
          example: "72F, sunny, wind 5mph"
        iteration_index:
          type: integer
          description: Zero-based model loop iteration in which this tool invocation occurred.
          readOnly: true
          example: 1
      required: [tool_name, iteration_index]
    ScheduledTask:
      type: object
      description: A durable scheduled task plus its next computed fire time.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-assigned UUIDv7 identifier for the task.
          example: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        name:
          type: string
          description: Human-readable label for the task.
          example: Morning briefing
        schedule: { $ref: "#/components/schemas/Schedule" }
        payload: { $ref: "#/components/schemas/SchedulePayload" }
        enabled:
          type: boolean
          description: Whether the task is active and eligible to fire.
          example: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp recording when the task was created.
          example: "2026-06-24T08:15:00Z"
        created_by:
          type: string
          readOnly: true
          description: Session or user ID that created the task.
          example: session-7f3a9c
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp recording when the task was last updated.
          example: "2026-06-24T09:42:00Z"
        next_run:
          type: string
          format: date-time
          readOnly: true
          description: Next computed fire time; omitted when the task has no future run.
          example: "2026-06-25T08:15:00Z"
      required: [id, name, schedule, payload, enabled, created_at, created_by, updated_at]
      example:
        id: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        name: Morning briefing
        schedule:
          kind: every
          every: 15m0s
          timezone: America/New_York
        payload:
          kind: wake
          target: session-7f3a9c
          data: { message: "Time for your morning briefing" }
        enabled: true
        created_at: "2026-06-24T08:15:00Z"
        created_by: session-7f3a9c
        updated_at: "2026-06-24T09:42:00Z"
        next_run: "2026-06-25T08:15:00Z"
    Schedule:
      type: object
      description: When a task fires.
      properties:
        kind:
          type: string
          enum: [at, every, cron]
          description: Schedule type selecting which of the timing fields applies.
          example: every
        at:
          type: string
          format: date-time
          description: One-shot fire time for the at kind.
          example: "2026-06-25T08:15:00Z"
        every:
          type: string
          description: Go duration string for the every kind, serialized in canonical form such as 15m0s; shorthand like 15m is accepted on input.
          example: 15m0s
        cron:
          type: string
          description: Cron expression for the cron kind.
          example: "0 8 * * *"
        timezone:
          type: string
          description: IANA timezone name in which the schedule is evaluated.
          example: America/New_York
      required: [kind]
    SchedulePayload:
      type: object
      description: What a task does when it fires.
      properties:
        kind:
          type: string
          enum: [wake, service, automation, webhook]
          description: Action type selecting how the payload is dispatched.
          example: wake
        target:
          type: string
          description: Kind-specific target such as a session ID, entity ID, or webhook reference.
          example: session-7f3a9c
        data:
          type: object
          additionalProperties: true
          description: Kind-specific data passed to the action when it fires.
          example: { message: "Time for your morning briefing" }
      required: [kind]
    ScheduleExecution:
      type: object
      description: One run of a scheduled task.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-assigned UUIDv7 identifier for this execution.
          example: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        task_id:
          type: string
          format: uuid
          readOnly: true
          description: UUIDv7 of the task this execution belongs to.
          example: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        scheduled_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when this run was supposed to fire.
          example: "2026-06-24T08:15:00Z"
        started_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when execution began; omitted before it starts.
          example: "2026-06-24T08:15:01Z"
        completed_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when execution finished; omitted until it completes.
          example: "2026-06-24T08:15:03Z"
        status:
          type: string
          enum: [pending, running, completed, failed, skipped]
          readOnly: true
          description: Current state of the execution.
          example: completed
        result:
          type: string
          readOnly: true
          description: Output or error message produced by the run.
          example: Briefing delivered
      example:
        id: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        task_id: 019e7468-1c2d-7a90-b3ef-2f0a9c4d5e6f
        scheduled_at: "2026-06-24T08:15:00Z"
        started_at: "2026-06-24T08:15:01Z"
        completed_at: "2026-06-24T08:15:03Z"
        status: completed
        result: Briefing delivered
      required: [id, task_id, scheduled_at, status]

    ChannelBinding:
      type: object
      description: >-
        Runtime identity of a channel-backed conversation, linking a live
        channel/address pair to any known contact record. Present only when the
        conversation carries meaningful channel metadata. All fields are omitted
        when empty.
      properties:
        channel:
          type: string
          readOnly: true
          description: Transport the conversation is bound to (e.g. signal, email, owu).
          example: signal
        address:
          type: string
          readOnly: true
          description: Channel-specific address of the remote party.
          example: "+15551234567"
        contact_id:
          type: string
          readOnly: true
          description: Identifier of the resolved contact record, when one is linked.
          example: contact-alice
        contact_name:
          type: string
          readOnly: true
          description: Display name of the resolved contact, when known.
          example: Alice
        trust_zone:
          type: string
          readOnly: true
          description: Trust zone the bound party falls into for gating decisions.
          example: trusted
        link_source:
          type: string
          readOnly: true
          description: How the contact link was established (e.g. exact, fuzzy, manual).
          example: exact
        is_owner:
          type: boolean
          readOnly: true
          description: Whether the bound party is the system owner.
          example: false
      example:
        channel: signal
        address: "+15551234567"
        contact_id: contact-alice
        contact_name: Alice
        trust_zone: trusted
        link_source: exact
        is_owner: false

    ConversationMetadata:
      type: object
      description: >-
        Typed metadata associated with a conversation. Stored as JSON so new
        fields can be added without schema churn; present only when it carries
        meaningful content.
      properties:
        channel_binding:
          $ref: "#/components/schemas/ChannelBinding"
          description: Channel identity bound to this conversation, when channel-backed.
      example:
        channel_binding:
          channel: signal
          address: "+15551234567"
          contact_id: contact-alice
          contact_name: Alice
          trust_zone: trusted
          link_source: exact
          is_owner: false

    ConversationSummary:
      type: object
      description: >-
        Lightweight conversation descriptor — identity, active message count,
        timestamps, and channel binding — with no message content. message_count
        is the true active count (uncapped).
      properties:
        id:
          type: string
          readOnly: true
          description: Conversation identifier (the kind prefix names its producer family).
          example: signal-alice
        message_count:
          type: integer
          readOnly: true
          description: Number of active (non-compacted) messages in the conversation.
          example: 42
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when the conversation was first created.
          example: "2026-06-20T08:15:00Z"
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for the conversation's most recent activity.
          example: "2026-06-24T14:31:07Z"
        channel_binding:
          $ref: "#/components/schemas/ChannelBinding"
          description: Channel identity bound to this conversation; omitted when not channel-backed.
      required: [id, message_count, created_at, updated_at]
      example:
        id: signal-alice
        message_count: 42
        created_at: "2026-06-20T08:15:00Z"
        updated_at: "2026-06-24T14:31:07Z"
        channel_binding:
          channel: signal
          address: "+15551234567"
          contact_id: contact-alice
          contact_name: Alice
          trust_zone: trusted
          link_source: exact
          is_owner: false

    ConversationPage:
      type: object
      description: >-
        One filtered, sorted, keyset-paginated page of conversation summaries
        plus the filter-wide total and the cursor for the next page.
      properties:
        conversations:
          type: array
          items: { $ref: "#/components/schemas/ConversationSummary" }
          readOnly: true
          description: The summaries on this page, in the requested sort order.
        count:
          type: integer
          readOnly: true
          description: Number of summaries returned on this page.
          example: 2
        total:
          type: integer
          readOnly: true
          description: Total conversations matching the filter, stable across pages (cursor-independent).
          example: 138
        next_cursor:
          type: [string, "null"]
          readOnly: true
          description: Opaque keyset cursor for the next page; null on the last page.
          example: "eyJzIjoidXBkYXRlZF9hdCIsImQiOiJkZXNjIiwidiI6IjIwMjYtMDYtMjRUMTQ6MzE6MDcuMDAwWiIsImkiOiJzaWduYWwtYWxpY2UifQ"
      required: [conversations, count, total, next_cursor]
      example:
        conversations:
          - id: signal-alice
            message_count: 42
            created_at: "2026-06-20T08:15:00Z"
            updated_at: "2026-06-24T14:31:07Z"
            channel_binding:
              channel: signal
              address: "+15551234567"
              contact_id: contact-alice
              contact_name: Alice
              trust_zone: trusted
              link_source: exact
              is_owner: false
          - id: sched-morning-briefing
            message_count: 7
            created_at: "2026-06-22T08:15:00Z"
            updated_at: "2026-06-24T08:15:03Z"
        count: 2
        total: 138
        next_cursor: "eyJzIjoidXBkYXRlZF9hdCIsImQiOiJkZXNjIiwidiI6IjIwMjYtMDYtMjRUMTQ6MzE6MDcuMDAwWiIsImkiOiJzaWduYWwtYWxpY2UifQ"

    ConversationMessage:
      type: object
      description: >-
        One message from a conversation transcript. The unified message type for
        both active working-memory messages and archived transcripts; archive-only
        fields are omitted for active messages.
      properties:
        id:
          type: string
          readOnly: true
          description: Message identifier — a UUIDv7 for messages Thane creates; imported messages preserve their external id.
          example: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        conversation_id:
          type: string
          readOnly: true
          description: Conversation this message belongs to; set on archived messages.
          example: signal-alice
        session_id:
          type: string
          readOnly: true
          description: Archive session this message was captured in; set on archived messages.
          example: 019e7460-0000-7000-8000-000000000001
        role:
          type: string
          readOnly: true
          description: Role of the message author.
          enum: [system, user, assistant, tool]
          example: user
        content:
          type: string
          readOnly: true
          description: Text content of the message.
          example: "Hey Bob, can you check the front door?"
        timestamp:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when the message was created.
          example: "2026-06-24T14:30:55Z"
        token_count:
          type: integer
          readOnly: true
          description: Estimated token count for the message content.
          example: 11
        tool_calls:
          type: string
          readOnly: true
          description: JSON-encoded array of tool calls, for assistant messages that requested tools.
          example: "[{\"id\":\"call_019e7469\",\"name\":\"lock_status\",\"arguments\":\"{\\\"door\\\":\\\"front\\\"}\"}]"
        tool_call_id:
          type: string
          readOnly: true
          description: Identifier of the tool call this message responds to, for tool-result messages.
          example: call_019e7469
        archived_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when the message was archived; omitted for active messages.
          example: "2026-06-24T15:00:00Z"
        archive_reason:
          type: string
          readOnly: true
          description: Why the message was archived (compaction, reset, shutdown, import); omitted for active messages.
          example: compaction
      required: [id, role, content, timestamp]
      example:
        id: 019e7469-3abf-7e6b-ae38-85b5e34915ac
        role: user
        content: "Hey Bob, can you check the front door?"
        timestamp: "2026-06-24T14:30:55Z"
        token_count: 11

    Conversation:
      type: object
      description: >-
        A full conversation transcript — identity, timestamps, optional channel
        metadata, and the ordered list of messages.
      properties:
        id:
          type: string
          readOnly: true
          description: Conversation identifier (the kind prefix names its producer family).
          example: signal-alice
        messages:
          type: array
          items: { $ref: "#/components/schemas/ConversationMessage" }
          readOnly: true
          description: The conversation's messages in chronological order.
        metadata:
          $ref: "#/components/schemas/ConversationMetadata"
          description: Typed conversation metadata; omitted when none is set.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when the conversation was first created.
          example: "2026-06-20T08:15:00Z"
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for the conversation's most recent activity.
          example: "2026-06-24T14:31:11Z"
      required: [id, messages, created_at, updated_at]
      example:
        id: signal-alice
        messages:
          - id: 019e7469-3abf-7e6b-ae38-85b5e34915ac
            role: user
            content: "Hey Bob, can you check the front door?"
            timestamp: "2026-06-24T14:30:55Z"
            token_count: 11
          - id: 019e7469-4c0d-7e6b-ae38-85b5e34915ad
            role: assistant
            content: "I've checked the front door and it's locked."
            timestamp: "2026-06-24T14:31:11Z"
            token_count: 12
        metadata:
          channel_binding:
            channel: signal
            address: "+15551234567"
            contact_id: contact-alice
            contact_name: Alice
            trust_zone: trusted
            link_source: exact
            is_owner: false
        created_at: "2026-06-20T08:15:00Z"
        updated_at: "2026-06-24T14:31:11Z"

    UsageSummary:
      type: object
      description: >-
        Aggregated token-usage and cost totals for one breakdown bucket
        (a model, upstream model, provider, or resource).
      required:
        - total_records
        - total_input_tokens
        - total_output_tokens
        - total_cache_creation_input_tokens
        - total_cache_read_input_tokens
        - total_cost_usd
      properties:
        total_records:
          type: integer
          readOnly: true
          description: Number of usage records aggregated into this bucket.
          example: 42
        total_input_tokens:
          type: integer
          format: int64
          readOnly: true
          description: Total non-cached input tokens billed in this bucket.
          example: 148213
        total_output_tokens:
          type: integer
          format: int64
          readOnly: true
          description: Total output tokens generated in this bucket.
          example: 28104
        total_cache_creation_input_tokens:
          type: integer
          format: int64
          readOnly: true
          description: Total input tokens written to the prompt cache in this bucket.
          example: 96000
        total_cache_read_input_tokens:
          type: integer
          format: int64
          readOnly: true
          description: Total input tokens served from the prompt cache in this bucket.
          example: 312500
        total_cost_usd:
          type: number
          readOnly: true
          description: Total estimated cost in USD for this bucket, from the config pricing table.
          example: 0.8421
      example:
        total_records: 42
        total_input_tokens: 148213
        total_output_tokens: 28104
        total_cache_creation_input_tokens: 96000
        total_cache_read_input_tokens: 312500
        total_cost_usd: 0.8421

    SessionStats:
      type: object
      description: >-
        Token-usage, cost, and context-window snapshot for the active
        session, plus per-model/provider/resource breakdowns and build
        metadata. Returned by GET /v1/sessions/stats.
      required:
        - total_input_tokens
        - total_output_tokens
        - total_cache_creation_input_tokens
        - total_cache_read_input_tokens
        - cache_hit_rate
        - total_requests
        - estimated_cost_usd
        - context_tokens
        - context_window
        - message_count
      properties:
        total_input_tokens:
          type: integer
          format: int64
          readOnly: true
          description: Total non-cached input tokens billed this session.
          example: 148213
        total_output_tokens:
          type: integer
          format: int64
          readOnly: true
          description: Total output tokens generated this session.
          example: 28104
        total_cache_creation_input_tokens:
          type: integer
          format: int64
          readOnly: true
          description: Total input tokens written to the prompt cache this session.
          example: 96000
        total_cache_read_input_tokens:
          type: integer
          format: int64
          readOnly: true
          description: Total input tokens served from the prompt cache this session.
          example: 312500
        cache_hit_rate:
          type: number
          readOnly: true
          description: >-
            Cache read fraction over the session, cache_read / (cache_read +
            cache_creation), in [0, 1]. Near zero on a cold start, high in a
            warm session.
          example: 0.765
        total_requests:
          type: integer
          format: int64
          readOnly: true
          description: Total number of model requests recorded this session.
          example: 137
        estimated_cost_usd:
          type: number
          readOnly: true
          description: Total estimated cost in USD this session, from the config pricing table.
          example: 1.2843
        reported_balance_usd:
          type: number
          readOnly: true
          description: Operator-reported account balance in USD, when one has been set.
          example: 48.72
        balance_set_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp when the reported balance was last set.
          example: "2026-06-24T08:00:00Z"
        by_model:
          type: object
          readOnly: true
          description: Per-model usage totals, keyed by model alias.
          additionalProperties: { $ref: "#/components/schemas/UsageSummary" }
        by_upstream_model:
          type: object
          readOnly: true
          description: Per-upstream-model usage totals, keyed by the resolved upstream model name.
          additionalProperties: { $ref: "#/components/schemas/UsageSummary" }
        by_provider:
          type: object
          readOnly: true
          description: Per-provider usage totals, keyed by provider name.
          additionalProperties: { $ref: "#/components/schemas/UsageSummary" }
        by_resource:
          type: object
          readOnly: true
          description: Per-resource usage totals, keyed by resource name.
          additionalProperties: { $ref: "#/components/schemas/UsageSummary" }
        context_tokens:
          type: integer
          readOnly: true
          description: Current token count of the active conversation context.
          example: 148213
        context_window:
          type: integer
          readOnly: true
          description: Maximum context-window size in tokens for the active model.
          example: 200000
        message_count:
          type: integer
          readOnly: true
          description: Number of messages currently held in the active conversation.
          example: 312
        build:
          $ref: "#/components/schemas/VersionInfo"
          description: Build and runtime metadata for the running process.
      example:
        total_input_tokens: 148213
        total_output_tokens: 28104
        total_cache_creation_input_tokens: 96000
        total_cache_read_input_tokens: 312500
        cache_hit_rate: 0.765
        total_requests: 137
        estimated_cost_usd: 1.2843
        reported_balance_usd: 48.72
        balance_set_at: "2026-06-24T08:00:00Z"
        by_model:
          thane:latest:
            total_records: 120
            total_input_tokens: 130000
            total_output_tokens: 24000
            total_cache_creation_input_tokens: 80000
            total_cache_read_input_tokens: 290000
            total_cost_usd: 1.1021
          gpt-oss:120b:
            total_records: 17
            total_input_tokens: 18213
            total_output_tokens: 4104
            total_cache_creation_input_tokens: 16000
            total_cache_read_input_tokens: 22500
            total_cost_usd: 0.1822
        by_provider:
          anthropic:
            total_records: 120
            total_input_tokens: 130000
            total_output_tokens: 24000
            total_cache_creation_input_tokens: 80000
            total_cache_read_input_tokens: 290000
            total_cost_usd: 1.1021
        context_tokens: 148213
        context_window: 200000
        message_count: 312
        build:
          version: v0.9.2-596-gf92a9208
          git_commit: f92a9208
          git_branch: main
          go_version: go1.26.1

    SessionMessage:
      type: object
      description: One user or assistant message from the active conversation history.
      required: [role, content, timestamp]
      properties:
        role:
          type: string
          readOnly: true
          description: Who authored the message.
          enum: [user, assistant]
          example: user
        content:
          type: string
          readOnly: true
          description: Plain-text content of the message.
          example: "Hey Bob, can you check the front door?"
        timestamp:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when the message was recorded.
          example: "2026-06-24T14:30:55Z"
      example:
        role: user
        content: "Hey Bob, can you check the front door?"
        timestamp: "2026-06-24T14:30:55Z"

    SessionHistory:
      type: object
      description: >-
        Wrapper around the active conversation's user and assistant
        messages, oldest first. Returned by GET /v1/sessions/history.
      required: [messages]
      properties:
        messages:
          type: array
          readOnly: true
          description: User and assistant messages, oldest first.
          items: { $ref: "#/components/schemas/SessionMessage" }
      example:
        messages:
          - role: user
            content: "Hey Bob, can you check the front door?"
            timestamp: "2026-06-24T14:30:55Z"
          - role: assistant
            content: "I've checked the front door and it's locked."
            timestamp: "2026-06-24T14:31:11Z"

    SessionActionAck:
      type: object
      description: >-
        Acknowledgement returned by session lifecycle actions
        (POST /v1/sessions/compact and POST /v1/sessions/reset).
      required: [status, message]
      properties:
        status:
          type: string
          readOnly: true
          description: Result status; always "ok" on success.
          example: ok
        message:
          type: string
          readOnly: true
          description: Human-readable summary of the action performed.
          example: conversation compacted
      example:
        status: ok
        message: conversation compacted

    SessionBalanceRequest:
      type: object
      description: Request body for POST /v1/sessions/balance, setting the reported account balance.
      required: [balance_usd]
      properties:
        balance_usd:
          type: number
          description: Account balance to record, in USD.
          example: 48.72
      example:
        balance_usd: 48.72

    SessionBalanceAck:
      type: object
      description: Acknowledgement returned by POST /v1/sessions/balance after recording the balance.
      required: [status, balance_usd]
      properties:
        status:
          type: string
          readOnly: true
          description: Result status; always "ok" on success.
          example: ok
        balance_usd:
          type: number
          readOnly: true
          description: The balance that was recorded, in USD, echoed back from the request.
          example: 48.72
      example:
        status: ok
        balance_usd: 48.72

    ArchiveDelegationMetadata:
      type: object
      description: >-
        Delegation-specific execution details preserved from the legacy
        delegations table during migration. Only populated on imported
        delegation sessions.
      required:
        - task
        - profile
        - model
        - iterations
        - max_iterations
        - input_tokens
        - output_tokens
        - exhausted
        - duration_ms
      properties:
        task:
          type: string
          readOnly: true
          description: The task the delegate was assigned to carry out.
          example: Draft a reply to Alice about the weekend plans
        guidance:
          type: string
          readOnly: true
          description: Optional extra guidance supplied to the delegate; omitted when none was given.
          example: Keep it warm but brief
        profile:
          type: string
          readOnly: true
          description: Delegate profile that governed the run.
          example: assistant
        model:
          type: string
          readOnly: true
          description: Model alias the delegate ran under.
          example: claude-opus-4-8
        iterations:
          type: integer
          readOnly: true
          description: Number of loop iterations the delegate actually used.
          example: 4
        max_iterations:
          type: integer
          readOnly: true
          description: Maximum loop iterations the delegate was permitted.
          example: 12
        input_tokens:
          type: integer
          readOnly: true
          description: Total input tokens consumed across the delegation run.
          example: 18213
        output_tokens:
          type: integer
          readOnly: true
          description: Total output tokens generated across the delegation run.
          example: 2048
        exhausted:
          type: boolean
          readOnly: true
          description: Whether the delegate hit its iteration budget before finishing.
          example: false
        exhaust_reason:
          type: string
          readOnly: true
          description: Why the delegate stopped early when exhausted; omitted when it ran to completion.
          example: max iterations reached
        result_content:
          type: string
          readOnly: true
          description: Final result text the delegate returned; omitted when empty.
          example: Replied to Alice confirming Saturday at 10am.
        duration_ms:
          type: integer
          format: int64
          readOnly: true
          description: Wall-clock duration of the delegation run, in milliseconds.
          example: 8412
        error:
          type: string
          readOnly: true
          description: Error message if the delegation failed; omitted on success.
          example: "delegate exceeded its deadline"
        messages:
          type: string
          readOnly: true
          description: >-
            Raw JSON-serialized conversation history from the legacy delegations
            table, preserved to avoid data loss; omitted when empty.
          example: '[{"role":"user","content":"Draft a reply to Alice"}]'
      example:
        task: Draft a reply to Alice about the weekend plans
        guidance: Keep it warm but brief
        profile: assistant
        model: claude-opus-4-8
        iterations: 4
        max_iterations: 12
        input_tokens: 18213
        output_tokens: 2048
        exhausted: false
        result_content: Replied to Alice confirming Saturday at 10am.
        duration_ms: 8412

    ArchivedSessionMetadata:
      type: object
      description: >-
        Rich, LLM-generated metadata for human-oriented search and browsing of
        an archived session. Stored as JSON so new fields can be added without
        schema migrations; all fields are omitted when empty.
      properties:
        channel_binding:
          $ref: "#/components/schemas/ChannelBinding"
          description: Channel/contact binding snapshot active when the session was created, preserved for forensics.
        one_liner:
          type: string
          readOnly: true
          description: Roughly ten-word summary of the session for compact display.
          example: Alice asked Thane to lock up and dim the lights
        paragraph:
          type: string
          readOnly: true
          description: Two-to-four-sentence summary of the session.
          example: Alice checked in on the house before leaving. Thane confirmed the front door was locked and dimmed the living-room lights.
        detailed:
          type: string
          readOnly: true
          description: Full prose summary of the session.
          example: Alice asked Thane to verify the front door and adjust the lighting before heading out for the evening. Thane confirmed the lock state, dimmed the living-room lights to 20%, and offered to arm the away mode.
        key_decisions:
          type: array
          items: { type: string }
          readOnly: true
          description: Key decisions or outcomes from the session.
          example:
            - Left away mode disarmed at Alice's request
        participants:
          type: array
          items: { type: string }
          readOnly: true
          description: People involved in or mentioned during the session.
          example:
            - Alice
            - Bob
        session_type:
          type: string
          readOnly: true
          description: Characterization of the session's nature (e.g. debugging, architecture, philosophy, casual).
          example: casual
        tools_used:
          type: object
          readOnly: true
          description: Tools invoked during the session, mapping tool name to call count.
          additionalProperties: { type: integer }
          example:
            lock_status: 1
            light_set: 2
        files_touched:
          type: array
          items: { type: string }
          readOnly: true
          description: Files touched or discussed during the session.
          example: []
        models:
          type: array
          items: { type: string }
          readOnly: true
          description: Model aliases used during the session, when known.
          example:
            - claude-opus-4-8
        delegation:
          $ref: "#/components/schemas/ArchiveDelegationMetadata"
          description: Legacy delegation execution details; present only on imported delegation sessions.
      example:
        one_liner: Alice asked Thane to lock up and dim the lights
        paragraph: Alice checked in on the house before leaving. Thane confirmed the front door was locked and dimmed the living-room lights.
        session_type: casual
        participants:
          - Alice
        tools_used:
          lock_status: 1
          light_set: 2
        models:
          - claude-opus-4-8

    ArchivedSession:
      type: object
      description: >-
        An archived conversation session — the durable record of one
        start-to-end run, with identity, timing, and rich metadata. Returned by
        the archive session endpoints.
      required:
        - id
        - conversation_id
        - started_at
        - message_count
      properties:
        id:
          type: string
          readOnly: true
          description: Session identifier — a UUIDv7 for native sessions; imported sessions use their source filename.
          example: 019e7460-0000-7000-8000-000000000001
        conversation_id:
          type: string
          readOnly: true
          description: Conversation this session belongs to.
          example: signal-alice
        started_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when the session began.
          example: "2026-06-24T08:15:01Z"
        ended_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when the session ended; omitted while the session is still active.
          example: "2026-06-24T09:42:00Z"
        end_reason:
          type: string
          readOnly: true
          description: Why the session ended (e.g. idle, shutdown, reset); omitted while active.
          example: idle
        message_count:
          type: integer
          readOnly: true
          description: Number of messages captured in the session.
          example: 312
        summary:
          type: string
          readOnly: true
          description: Short summary of the session; omitted when none has been generated.
          example: Evening check-in — locked up and dimmed the lights.
        title:
          type: string
          readOnly: true
          description: Human-friendly session title; omitted when none has been set.
          example: Evening house check-in
        tags:
          type: array
          items: { type: string }
          readOnly: true
          description: Free-form tags applied to the session; omitted when none are set.
          example:
            - household
            - lighting
        metadata:
          $ref: "#/components/schemas/ArchivedSessionMetadata"
          description: Rich LLM-generated session metadata; omitted when none is set.
        parent_session_id:
          type: string
          readOnly: true
          description: Parent session that spawned this one (e.g. a delegate's parent); omitted for top-level sessions.
          example: 019e7460-1a2b-7c3d-8e4f-1234567890ab
        parent_tool_call_id:
          type: string
          readOnly: true
          description: Tool call in the parent that triggered this child session; omitted for top-level sessions.
          example: call_019e7460abcd
      example:
        id: 019e7460-0000-7000-8000-000000000001
        conversation_id: signal-alice
        started_at: "2026-06-24T08:15:01Z"
        ended_at: "2026-06-24T09:42:00Z"
        end_reason: idle
        message_count: 312
        summary: Evening check-in — locked up and dimmed the lights.
        title: Evening house check-in
        tags:
          - household
          - lighting
        metadata:
          one_liner: Alice asked Thane to lock up and dim the lights
          session_type: casual
          participants:
            - Alice

    ArchivedToolCall:
      type: object
      description: A tool call preserved in the session archive.
      required:
        - id
        - conversation_id
        - session_id
        - tool_name
        - arguments
        - started_at
        - archived_at
      properties:
        id:
          type: string
          readOnly: true
          description: Stable identifier of the archived tool call.
          example: call_019e7469
        conversation_id:
          type: string
          readOnly: true
          description: Conversation the tool call was made in.
          example: signal-alice
        session_id:
          type: string
          readOnly: true
          description: Archive session the tool call belongs to.
          example: 019e7460-0000-7000-8000-000000000001
        tool_name:
          type: string
          readOnly: true
          description: Name of the tool that was invoked.
          example: lock_status
        arguments:
          type: string
          readOnly: true
          description: JSON-encoded arguments the tool was called with.
          example: '{"door":"front"}'
        result:
          type: string
          readOnly: true
          description: JSON-encoded or text result the tool returned; omitted when the call errored or returned nothing.
          example: '{"locked":true}'
        error:
          type: string
          readOnly: true
          description: Error message if the tool call failed; omitted on success.
          example: "tool request timed out"
        started_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when the tool call started.
          example: "2026-06-24T14:30:55Z"
        completed_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when the tool call completed; omitted while still in flight.
          example: "2026-06-24T14:30:56Z"
        duration_ms:
          type: integer
          format: int64
          readOnly: true
          description: Wall-clock duration of the tool call, in milliseconds; omitted when not recorded.
          example: 412
        archived_at:
          type: string
          format: date-time
          readOnly: true
          description: RFC3339 timestamp for when the tool call was archived.
          example: "2026-06-24T15:00:00Z"
        iteration_index:
          type: integer
          readOnly: true
          description: Zero-based loop iteration the tool call belongs to; omitted when not tracked.
          example: 2
      example:
        id: call_019e7469
        conversation_id: signal-alice
        session_id: 019e7460-0000-7000-8000-000000000001
        tool_name: lock_status
        arguments: '{"door":"front"}'
        result: '{"locked":true}'
        started_at: "2026-06-24T14:30:55Z"
        completed_at: "2026-06-24T14:30:56Z"
        duration_ms: 412
        archived_at: "2026-06-24T15:00:00Z"
        iteration_index: 2

    ArchiveSearchResult:
      type: object
      description: >-
        One full-text search hit from the archive, with the matched message and
        the surrounding context messages on either side.
      required:
        - match
        - session_id
        - context_before
        - context_after
        - score
      properties:
        match:
          $ref: "#/components/schemas/ConversationMessage"
          description: The message that matched the query.
        session_id:
          type: string
          readOnly: true
          description: Archive session the matched message belongs to.
          example: 019e7460-0000-7000-8000-000000000001
        context_before:
          type: array
          items: { $ref: "#/components/schemas/ConversationMessage" }
          readOnly: true
          description: Messages immediately preceding the match, oldest first; empty when context expansion is disabled.
        context_after:
          type: array
          items: { $ref: "#/components/schemas/ConversationMessage" }
          readOnly: true
          description: Messages immediately following the match, oldest first; empty when context expansion is disabled.
        highlight:
          type: string
          readOnly: true
          description: Snippet of the match with the query terms highlighted; omitted when unavailable.
          example: "...can you check the <b>front door</b>?"
        score:
          type: number
          readOnly: true
          description: >-
            Relevance signal (higher is a better match), derived from the FTS5
            BM25 rank. Comparable within a match_type bucket but not across
            buckets; zero on the LIKE fallback path.
          example: 0.92
        match_type:
          type: string
          readOnly: true
          description: >-
            Which pass produced the hit — "phrase" (literal-phrase precision) or
            "terms" (OR-of-terms recall); omitted on the LIKE fallback path.
          enum: [phrase, terms]
          example: phrase
      example:
        match:
          id: 019e7469-3abf-7e6b-ae38-85b5e34915ac
          conversation_id: signal-alice
          session_id: 019e7460-0000-7000-8000-000000000001
          role: user
          content: "Hey Bob, can you check the front door?"
          timestamp: "2026-06-24T14:30:55Z"
          token_count: 11
        session_id: 019e7460-0000-7000-8000-000000000001
        context_before: []
        context_after:
          - id: 019e7469-4c0d-7e6b-ae38-85b5e34915ad
            conversation_id: signal-alice
            session_id: 019e7460-0000-7000-8000-000000000001
            role: assistant
            content: "I've checked the front door and it's locked."
            timestamp: "2026-06-24T14:31:11Z"
            token_count: 12
        highlight: "...can you check the <b>front door</b>?"
        score: 0.92
        match_type: phrase

    ArchiveStats:
      type: object
      description: >-
        Aggregate size and coverage statistics for the session archive — totals,
        the captured time span, and per-role and per-status breakdowns. Returned
        by GET /v1/archive/stats.
      required:
        - total_messages
        - total_sessions
        - total_tool_calls
        - by_role
      properties:
        total_messages:
          type: integer
          readOnly: true
          description: Total number of messages held in the archive.
          example: 318204
        total_sessions:
          type: integer
          readOnly: true
          description: Total number of archived sessions.
          example: 1842
        total_tool_calls:
          type: integer
          readOnly: true
          description: Total number of archived tool calls.
          example: 90431
        oldest_message:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp of the oldest message in the archive; omitted when the archive is empty.
          example: "2025-11-02T03:14:00Z"
        newest_message:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp of the newest message in the archive; omitted when the archive is empty.
          example: "2026-06-24T14:31:11Z"
        by_role:
          type: object
          readOnly: true
          description: Message counts grouped by author role.
          additionalProperties: { type: integer }
          example:
            user: 142100
            assistant: 141980
            tool: 32100
            system: 2024
        by_status:
          type: object
          readOnly: true
          description: Message counts grouped by storage status (unified-mode archives only).
          additionalProperties: { type: integer }
          example:
            active: 12044
            archived: 306160
        by_reason:
          type: object
          readOnly: true
          description: Message counts grouped by archive reason (legacy-mode archives only).
          additionalProperties: { type: integer }
          example:
            compaction: 280102
            shutdown: 24100
            import: 14002
      example:
        total_messages: 318204
        total_sessions: 1842
        total_tool_calls: 90431
        oldest_message: "2025-11-02T03:14:00Z"
        newest_message: "2026-06-24T14:31:11Z"
        by_role:
          user: 142100
          assistant: 141980
          tool: 32100
          system: 2024
        by_status:
          active: 12044
          archived: 306160

