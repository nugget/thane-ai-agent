# Vacuum ruleset for Thane's OpenAPI specs — issue #1060 (Godoc parity for /docs/).
#
# Extends vacuum's recommended OpenAPI ruleset, with two Thane-specific changes:
#
#   1. snake_case property names are deliberate — they are the JSON wire
#      convention for the whole API — so the built-in camelCase rule (which
#      fired 61 false positives) is disabled.
#
#   2. a property-level description rule (`thane-property-description`) — the
#      Godoc-parity rule: every documented field carries a description.
#
# Severity strategy (#1060): structural problems (invalid schemas, undefined
# tags) fail `just ci` at `error`. Content rules are flipped to `error` one at a
# time as each backfill completes: thane-property-description is now ENFORCED
# (the Execution + System component schemas are fully documented); the remaining
# content rules (response examples, etc.) ride at vacuum's default `warn` until
# their backfills land.
#
# `extends` uses the nested-list form `[[ruleset, level]]` (level is one of
# all | recommended | off) — this enables vacuum's built-in OpenAPI ruleset at
# its `recommended` subset. `vacuum:oas` is vacuum's native ruleset identifier.
extends: [[vacuum:oas, recommended]]

rules:
  # snake_case is the deliberate, API-wide wire convention — it matches the
  # frozen OpenAI/Ollama compat surfaces (completion_tokens, finish_reason),
  # Home Assistant, the shared Go json tags, and the persisted message/archive
  # shapes. camelCase would split native from the unchangeable compat protocols,
  # so this rule is disabled by decision (#1060), not worked around.
  camel-case-properties: false

  # Godoc parity: every component-schema property MUST be documented. Enforced
  # at `error` as of the Execution + System backfills (#1060) — a missing
  # property description now fails `just ci`. ($ref properties inherit their
  # description from the referenced schema and are not flagged.)
  thane-property-description:
    description: Schema properties must carry a description (Godoc parity).
    severity: error
    recommended: true
    given: "$.components.schemas[*].properties[*]"
    then:
      field: description
      function: truthy

  # Operation requestBodies and parameters are now ENFORCED at error (#1060):
  # each must carry a description. (vacuum's operation-description rule gates the
  # requestBody description specifically — verified by removing one and watching
  # the error-gate fail — not only the operation-level description.) Response
  # examples (oas3-missing-example) remain the last content rule at warn.
  operation-description: error
  oas3-parameter-description: error
