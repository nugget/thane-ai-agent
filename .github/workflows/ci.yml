name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Split the gate into independent jobs so wall-clock is the slowest job, not
# the sum. golangci-lint and vacuum are hermetic (tools/go.mod, run via
# `go run` inside the just recipes) — no install steps. lychee is the one
# non-Go tool and is installed only where link-check runs.
env:
  LYCHEE_VERSION: '0.23.0'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: |
            go.sum
            tools/go.sum
      - uses: extractions/setup-just@v4
      - name: Test (race) + coverage
        run: just cover
      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: |
            go.sum
            tools/go.sum
      - uses: extractions/setup-just@v4
      - name: Cache golangci-lint analysis
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('tools/go.sum', '.golangci.yml') }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-
      - name: Lint
        run: just lint

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: |
            go.sum
            tools/go.sum
      - uses: extractions/setup-just@v4
      - name: Install lychee
        uses: taiki-e/install-action@v2
        with:
          tool: lychee@${{ env.LYCHEE_VERSION }}
      - name: Static checks
        run: just generate && just fmt-check mod-tidy-check config-generate-check architecture-check lint-openapi link-check
