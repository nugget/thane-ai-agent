name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  GO_VERSION: '1.25'
  # golangci-lint and vacuum are pinned in tools/go.mod and run via `go run`
  # (see the just recipes) — no install step here. lychee is a Rust tool and
  # has no go.mod home, so it stays a pinned download.
  LYCHEE_VERSION: '0.23.0'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release tag
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          # setup-go@v6 enables caching by default; set it explicitly so the
          # intent (and that cache-dependency-path is honored) is unambiguous.
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install lychee
        uses: taiki-e/install-action@v2
        with:
          tool: lychee@${{ env.LYCHEE_VERSION }}

      - name: Run CI gate
        run: just ci

  container:
    needs: validate
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Generate embedded build inputs
        run: just generate

      - name: Capture build metadata
        id: build_meta
        run: echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate container metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=Thane
            org.opencontainers.image.description=Autonomous AI agent for Home Assistant
            org.opencontainers.image.authors=David McNett (https://github.com/nugget)
            org.opencontainers.image.url=https://github.com/nugget/thane-ai-agent
            org.opencontainers.image.source=https://github.com/nugget/thane-ai-agent
            org.opencontainers.image.documentation=https://github.com/nugget/thane-ai-agent/tree/main/docs
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=nugget

      - name: Build and push multi-arch container
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            THANE_VERSION=${{ github.ref_name }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_BRANCH=${{ github.ref_name }}
            BUILD_TIME=${{ steps.build_meta.outputs.build_time }}

      - name: Attest container image
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
